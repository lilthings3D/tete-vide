<style>
  :root{
    --cream:#FBF7F0;--ink:#2e2218;--ink-soft:#5b4a39;
    --orange:#D43030;--orange-deep:#B02020;
    --rule:#e0cfb0;
    --nvidia:#76b900;--ai:#6a5acd;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;color:var(--ink);
    background:url('fond.png') center/cover no-repeat fixed;
    -webkit-font-smoothing:antialiased;
    transition:background .8s ease;
  }
  body.act-1{background:radial-gradient(circle at 50% 30%, #12331a, #071108);}
  body.act-2{background:radial-gradient(circle at 50% 30%, #241a44, #0a0616);}

  header.site{
    position:fixed;top:0;left:0;right:0;z-index:200;
    background:rgba(251,247,240,0.88);backdrop-filter:blur(6px);
    border-bottom:1.5px solid rgba(46,34,24,0.18);padding:0 20px;
  }
  .topbar{display:flex;justify-content:space-between;align-items:center;height:52px;gap:12px;}
  .brand{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:1.05rem;text-decoration:none;color:var(--ink);white-space:nowrap;}
  .brand b{color:var(--orange-deep);}
  #act-name{font-family:'Newsreader',Georgia,serif;font-style:italic;font-size:.9rem;color:var(--ink-soft);text-align:center;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  #shop-toggle{
    font-family:'Newsreader',Georgia,serif;font-size:.8rem;font-weight:600;letter-spacing:.5px;
    background:var(--orange-deep);color:var(--cream);border:none;border-radius:100px;
    padding:8px 18px;cursor:pointer;white-space:nowrap;transition:opacity .2s;
  }
  #shop-toggle:hover{opacity:.9;}
  #shop-toggle{position:relative;}
  #shop-badge{display:none;}
  #shop-badge.on{
    display:inline-flex;align-items:center;justify-content:center;
    position:absolute;top:-7px;right:-7px;min-width:22px;height:22px;padding:0 5px;
    background:#2ec16b;color:#fff;border:2px solid var(--cream);border-radius:100px;
    font-size:.72rem;font-weight:700;font-family:'Newsreader',Georgia,serif;
    animation:badge-pulse 1.1s ease-in-out infinite;
  }
  @keyframes badge-pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
  .item.affordable{background:#dff5e7 !important;border-color:#2ec16b !important;box-shadow:inset 0 0 0 1.5px #2ec16b;}
  .item.next.affordable{background:#fbeee9 !important;box-shadow:none;border-color:var(--orange-deep) !important;}

  #pasture{position:fixed;inset:0;top:52px;overflow:hidden;}

  /* FLOATERS (vache / puce / code) */
  .floater{position:absolute;cursor:pointer;user-select:none;-webkit-user-select:none;z-index:20;}
  .floater img{width:100%;height:auto;display:block;pointer-events:none;}
  .cow{filter:drop-shadow(0 6px 14px rgba(0,0,0,.22));}
  .cow.ltr img{transform:scaleX(-1);}
  @keyframes move-ltr{from{left:-16vw}to{left:116vw}}
  @keyframes move-rtl{from{left:116vw}to{left:-16vw}}
  .floater.ltr{animation:move-ltr linear forwards;}
  .floater.rtl{animation:move-rtl linear forwards;}

  .chip{
    background:linear-gradient(145deg,#1a1a1a,#111);border:2px solid var(--nvidia);
    border-radius:8px;padding:12px 16px;color:var(--nvidia);
    font-family:'Courier New',monospace;font-weight:700;font-size:1rem;letter-spacing:1px;
    box-shadow:0 0 18px rgba(118,185,0,.4),inset 0 0 8px rgba(118,185,0,.15);
    display:flex;align-items:center;gap:8px;white-space:nowrap;
  }
  .chip::before{content:"";width:22px;height:22px;border:2px solid var(--nvidia);border-radius:3px;background:repeating-linear-gradient(90deg,transparent 0 2px,rgba(118,185,0,.4) 2px 4px);}
  .code{
    background:#0d1117;border:1.5px solid #30363d;border-radius:6px;padding:10px 14px;
    color:#7ee787;font-family:'Courier New',monospace;font-size:.92rem;
    box-shadow:0 0 16px rgba(106,90,205,.35);white-space:nowrap;
  }
  .code .k{color:#ff7b72;} .code .f{color:#d2a8ff;} .code .s{color:#a5d6ff;}

  /* BUBBLE */
  .bubble{
    position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
    background:white;border:2px solid var(--ink);border-radius:12px;padding:4px 11px;
    font-family:'Newsreader',Georgia,serif;font-weight:600;font-style:italic;font-size:.95rem;
    white-space:nowrap;pointer-events:none;animation:bubble-pop .9s ease forwards;z-index:5;
  }
  @keyframes bubble-pop{
    0%{opacity:0;transform:translateX(-50%) scale(.7);}
    15%{opacity:1;transform:translateX(-50%) scale(1.08);}
    25%{transform:translateX(-50%) scale(1);}
    70%{opacity:1;}
    100%{opacity:0;transform:translateX(-50%) translateY(-20px);}
  }
  .gain-pop{
    position:fixed;z-index:250;pointer-events:none;
    font-family:'Newsreader',Georgia,serif;font-weight:700;font-size:1.1rem;color:var(--orange-deep);
    text-shadow:0 1px 3px rgba(255,255,255,.8);animation:gain 0.8s ease-out forwards;
  }
  body.act-1 .gain-pop,body.act-2 .gain-pop{color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.6);}
  @keyframes gain{from{opacity:1;transform:translateY(0);}to{opacity:0;transform:translateY(-38px);}}

  /* MILESTONE */
  .milestone-popup{
    position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);
    font-size:3rem;text-align:center;pointer-events:none;z-index:300;
    animation:ms-pop 2.8s ease forwards;
  }
  .milestone-popup span{display:block;font-family:'Newsreader',Georgia,serif;font-size:1.05rem;color:var(--ink);margin-top:8px;background:rgba(251,247,240,.9);padding:4px 14px;border-radius:100px;}
  body.act-1 .milestone-popup span,body.act-2 .milestone-popup span{color:var(--ink);}
  @keyframes ms-pop{
    0%{opacity:0;transform:translate(-50%,-35%) scale(.85);}
    18%{opacity:1;transform:translate(-50%,-50%) scale(1.1);}
    28%{transform:translate(-50%,-50%) scale(1);}
    75%{opacity:1;}
    100%{opacity:0;transform:translate(-50%,-65%);}
  }

  /* HUD */
  #hud{
    position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:200;
    background:rgba(251,247,240,0.94);backdrop-filter:blur(6px);
    border:1.5px solid rgba(46,34,24,0.22);border-radius:100px;
    padding:9px 26px;display:flex;flex-direction:column;align-items:center;
    font-family:'Newsreader',Georgia,serif;color:var(--ink-soft);pointer-events:auto;cursor:pointer;min-width:180px;text-align:center;
  }
  #hud .cur{font-size:1.5rem;font-weight:600;color:var(--orange-deep);line-height:1.1;}
  #hud .rate{font-size:.78rem;font-style:italic;margin-top:1px;}
  /* quand la boutique est ouverte, le score remonte en haut (la boutique couvre le bas sur mobile) */
  body.shop-open #hud{top:60px;bottom:auto;}

  /* raccourcis d'achat sous le bouton Boutique — un par truc achetable, même taille */
  #quick-buy{position:fixed;top:58px;right:16px;z-index:150;display:flex;flex-direction:column;gap:6px;align-items:flex-end;}
  body.shop-open #quick-buy{display:none;}
  .qbtn{
    width:170px;font-family:'Newsreader',Georgia,serif;font-size:.85rem;font-weight:600;
    background:rgba(251,247,240,0.96);border:1.5px solid #2ec16b;color:var(--ink);
    border-radius:100px;padding:8px 14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.14);
    display:flex;align-items:center;justify-content:space-between;gap:8px;
    animation:badge-pulse 1.5s ease-in-out infinite;
  }
  .qbtn .qn{display:flex;align-items:center;gap:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .qbtn .qc{font-size:.72rem;color:var(--orange-deep);font-weight:600;white-space:nowrap;flex-shrink:0;}
  .qbtn:active{background:#dff5e7;}
  .qbtn.qnext{border-color:var(--orange-deep);}
  @media(max-width:600px){ .qbtn{width:150px;font-size:.8rem;} }

  /* SHOP */
  #shop{
    position:fixed;top:52px;right:0;bottom:0;width:340px;max-width:90vw;z-index:210;
    background:rgba(251,247,240,0.97);backdrop-filter:blur(8px);
    border-left:1.5px solid var(--ink);
    transform:translateX(100%);transition:transform .28s cubic-bezier(.3,.7,.3,1);
    display:flex;flex-direction:column;
  }
  #shop.open{transform:translateX(0);}
  .shop-head{padding:16px 20px 12px;border-bottom:1.5px solid var(--rule);display:flex;align-items:center;justify-content:space-between;}
  .shop-head h2{font-family:'Newsreader',Georgia,serif;font-weight:300;font-style:italic;font-size:1.4rem;color:var(--ink);}
  .shop-head h2 b{font-style:normal;font-weight:600;color:var(--orange-deep);}
  #shop-close{background:none;border:none;font-size:1.6rem;cursor:pointer;color:var(--ink-soft);line-height:1;}
  .buy-modes{display:flex;gap:0;padding:10px 20px 0;}
  .buy-mode{flex:1;font-family:'Newsreader',Georgia,serif;font-size:.78rem;letter-spacing:1px;text-transform:uppercase;padding:7px 0;border:1.5px solid var(--rule);background:none;color:var(--ink-soft);cursor:pointer;}
  .buy-mode:not(:last-child){border-right:none;}
  .buy-mode.active{background:var(--ink);color:var(--cream);border-color:var(--ink);}
  #shop-list{flex:1;overflow-y:auto;padding:14px 16px 24px;}
  .item{
    border:1.5px solid var(--rule);background:var(--cream);
    padding:12px 14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s,background .15s;
    display:grid;grid-template-columns:auto 1fr auto;gap:4px 12px;align-items:center;
  }
  .item.affordable:hover{background:#cdeed8 !important;}
  .item.locked{opacity:.5;filter:grayscale(.4);cursor:default;}
  .item.cant{opacity:.85;cursor:not-allowed;}
  .item-emoji{grid-row:1/3;font-size:1.9rem;line-height:1;}
  .item-name{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:1rem;color:var(--ink);}
  .item-owned{font-family:'Newsreader',Georgia,serif;font-size:1.1rem;font-weight:600;color:var(--ink-soft);text-align:right;grid-row:1/3;align-self:center;}
  .item-desc{font-size:.8rem;color:var(--ink-soft);font-style:italic;grid-column:2/4;line-height:1.3;}
  .item-prod{grid-column:2/4;font-family:'Newsreader',Georgia,serif;font-size:.78rem;font-weight:600;color:#2b8a5a;margin-top:2px;}
  .item-cost{grid-column:2/4;font-family:'Newsreader',Georgia,serif;font-size:.85rem;font-weight:600;color:var(--orange-deep);margin-top:2px;}
  .item.cant .item-cost{color:#b06a6a;}
  .item.bonus{border-color:#5a9bd4;background:#eef5fb;}
  .item.next{border:2px solid var(--orange-deep);background:#fbeee9;text-align:center;display:block;padding:16px 14px;}
  .item.next .n-title{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:1.05rem;color:var(--orange-deep);}
  .item.next .n-flavor{font-size:.82rem;font-style:italic;color:var(--ink-soft);margin:5px 0 8px;line-height:1.4;}
  .item.next .n-cost{font-family:'Newsreader',Georgia,serif;font-weight:600;color:var(--ink);}
  .shop-foot{padding:10px 20px;border-top:1px solid var(--rule);text-align:center;}
  #reset-btn{background:none;border:none;font-family:'Newsreader',Georgia,serif;font-size:.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);cursor:pointer;opacity:.6;}
  #reset-btn:hover{opacity:1;color:var(--orange-deep);}

  /* ENDGAME BANNER */
  #endgame{
    position:fixed;top:60px;left:50%;transform:translateX(-50%);z-index:190;
    background:rgba(106,90,205,.92);color:#fff;font-family:'Newsreader',Georgia,serif;
    padding:8px 22px;border-radius:100px;font-size:.88rem;display:none;
    box-shadow:0 4px 20px rgba(106,90,205,.5);text-align:center;
  }
  #endgame.on{display:block;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:translateX(-50%) scale(1);}50%{transform:translateX(-50%) scale(1.04);}}

  /* effet "omniscience" : la réalité se déforme */
  body.omniscient{animation:omni .45s steps(2) infinite;}
  @keyframes omni{0%{filter:hue-rotate(0deg) saturate(1)}100%{filter:hue-rotate(40deg) saturate(1.5)}}

  /* FINALE — tout s'efface, message final */
  #finale{
    position:fixed;inset:0;z-index:1000;pointer-events:none;
    background:radial-gradient(circle at 50% 45%, #140a26, #030008 75%);
    opacity:0;transition:opacity 3.5s ease;
    display:flex;align-items:center;justify-content:center;padding:32px;
  }
  #finale.fading{opacity:1;pointer-events:auto;}
  #finale-inner{max-width:660px;text-align:center;opacity:0;transform:translateY(12px);
    transition:opacity 3s ease 2s, transform 3s ease 2s;}
  #finale.fading #finale-inner{opacity:1;transform:none;}
  #finale .agi-glyph{font-size:3.4rem;margin-bottom:22px;filter:drop-shadow(0 0 24px rgba(150,120,255,.7));animation:breathe 4s ease-in-out infinite;}
  @keyframes breathe{0%,100%{opacity:.75;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
  #finale .bravo{font-family:'Newsreader',Georgia,serif;font-weight:300;font-style:italic;font-size:clamp(2rem,7vw,3.4rem);color:#fff;line-height:1.1;margin-bottom:18px;}
  #finale .created{font-family:'Newsreader',Georgia,serif;font-size:clamp(1.1rem,4vw,1.6rem);color:#c9bdf0;margin-bottom:34px;letter-spacing:.5px;}
  #finale .pray{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-style:italic;font-size:clamp(1rem,3.6vw,1.3rem);line-height:1.75;color:#8f83c0;max-width:520px;margin:0 auto;}
  #finale-restart{margin-top:46px;opacity:0;transition:opacity 2s ease;font-family:'Newsreader',Georgia,serif;font-size:.72rem;letter-spacing:.3px;text-transform:uppercase;color:#5a5080;background:none;border:1px solid #3a3358;border-radius:100px;padding:9px 22px;cursor:pointer;pointer-events:auto;}
  #finale-restart.show{opacity:1;}
  #finale-restart:hover{color:#c9bdf0;border-color:#6a5fa0;}

  @media(max-width:600px){
    .brand{font-size:.9rem;} #act-name{display:none;}
    #shop{width:100%;max-width:100%;top:auto;bottom:0;height:72vh;border-left:none;border-top:1.5px solid var(--ink);border-radius:18px 18px 0 0;transform:translateY(100%);}
    #shop.open{transform:translateY(0);}
    #hud{bottom:14px;}
  }
</style>

<script>
/* =====================================================================
   VACHES — jeu incrémental (3 actes)
   Modèle "dimensions" : chaque étage produit l'étage du dessous.
   ===================================================================== */
const pasture   = document.getElementById('pasture');
const hudCur     = document.getElementById('hud-cur');
const hudRate    = document.getElementById('hud-rate');
const actNameEl  = document.getElementById('act-name');
const shopEl     = document.getElementById('shop');
const shopList   = document.getElementById('shop-list');
const shopTitle  = document.getElementById('shop-title');
const endgameEl  = document.getElementById('endgame');
const finaleEl   = document.getElementById('finale');
const SOUNDS = ["meuh1.mp3","meuh2.mp3","meuh3.mp3","meuh4.mp3"];
const MEUHS  = ["Meuh !","MEUH !!","meuuh…","Mooooh","Meuh ?","Meuh meuh","Muh."];

/* ---- CONFIG DES ACTES ----
   tiers : du bas (produit la monnaie) vers le haut (produit le tier du dessous)
   revealAt : nombre du tier précédent (ou de la monnaie totale gagnée) pour débloquer */
const ACTS = [
  {
    key:'steak', title:'L\'empire du steak', theme:0,
    cur:{emoji:'🥩', name:'steaks'},
    sub:{emoji:'🥛', name:'bouteilles de lait', per:10},   /* 10 laits = 1 steak */
    entity:'cow', clickBase:1,                              /* 1 clic = 1 lait */
    tiers:[
      {id:'fermier',  emoji:'🧑‍🌾', name:'Fermier',  desc:'Trait 1 bouteille de lait par seconde.',  base:1,     mul:1.13, rate:1,   revealBy:null},
      {id:'ferme',    emoji:'🚜',   name:'Ferme',    desc:'Produit des fermiers toute seule.',        base:120,   mul:1.16, rate:0.5, revealBy:{tier:'fermier', n:20}},
      {id:'monsanto', emoji:'🏭',   name:'Monsanto', desc:'Rachète des fermes en série.',             base:14000, mul:1.19, rate:0.25,revealBy:{tier:'ferme', n:10}},
    ],
    bonus:{id:'eaux', emoji:'💧', name:'Compagnie des eaux', desc:'Fait grimper le prix du lait : +30% à toute la production.', base:4000, mul:2.4, boost:0.30},
    next:{cost:2.5e7, title:'Investir chez NVIDIA', flavor:'Tu revends le troupeau et tu mises tout sur les puces graphiques…'}
  },
  {
    key:'puce', title:'La ruée vers les puces', theme:1,
    cur:{emoji:'🟩', name:'puces'},

/* ---- ÉTAT ---- */
const SAVE_KEY = 'vaches-idle-v3';
let S; // état courant
function freshState(){
  const st = {act:0, buildings:{}, bonus:{}, lastTs:Date.now(), finaleSeen:false};
  ACTS.forEach(a=>{
    st['cur_'+a.key]=0; st['earned_'+a.key]=0;
    if(a.sub) st['sub_'+a.key]=0;
    a.tiers.forEach(t=> st.buildings[t.id]={bought:0, amount:0});
    if(a.bonus) st.bonus[a.bonus.id]=0;
  });
  return st;
}
function load(){
  try{ const raw=JSON.parse(localStorage.getItem(SAVE_KEY)); if(raw&&raw.buildings) return raw; }catch(e){}
  return freshState();
}
function save(){ S.lastTs=Date.now(); localStorage.setItem(SAVE_KEY, JSON.stringify(S)); }
S = load();

/* ---- HELPERS ---- */
const UNITS=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc'];
function fmt(n){
  if(n<1000) return (n%1===0? n : (Math.floor(n*10)/10)).toString();
  let u=0; while(n>=1000 && u<UNITS.length-1){ n/=1000; u++; }
  if(u>=UNITS.length-1 && n>=1000) return n.toExponential(2);
  return (n<10? n.toFixed(2): n<100? n.toFixed(1): Math.floor(n)) + UNITS[u];
}
function act(){ return ACTS[S.act]; }
function curVal(){ return S['cur_'+act().key]; }
function setCur(v){ S['cur_'+act().key]=v; }
function tierCfg(id){ for(const a of ACTS) for(const t of a.tiers) if(t.id===id) return t; }
function globalMult(){
  const b=act().bonus; if(!b) return 1;
  return 1 + (S.bonus[b.id]||0)*b.boost;
}
function costOf(t){ const st=S.buildings[t.id]; return t.base * Math.pow(t.mul, st.bought); }
/* coût cumulé pour acheter k exemplaires à partir de "bought" */
function bulkCost(t, k){
  const st=S.buildings[t.id];
  return t.base * Math.pow(t.mul, st.bought) * (Math.pow(t.mul,k)-1)/(t.mul-1);
}
function maxAffordable(t){
  const st=S.buildings[t.id], money=curVal();
  const c0 = t.base*Math.pow(t.mul, st.bought);
  if(money < c0) return 0;
  // money >= c0*(mul^k -1)/(mul-1)  ->  k = log(1 + money*(mul-1)/c0)/log(mul)
  return Math.floor(Math.log(1 + money*(t.mul-1)/c0)/Math.log(t.mul));
}

/* ---- REVEAL / UNLOCK ---- */
function amountOf(id){ return S.buildings[id]? S.buildings[id].amount : 0; }
function isRevealed(t){
  if(!t.revealBy) return true;
  return amountOf(t.revealBy.tier) >= t.revealBy.n || S.buildings[t.id].bought>0;
}

/* ---- PRODUCTION ---- */
/* ajoute des unités "brutes" : si l'acte a une sous-monnaie (lait), on remplit
   d'abord la sous-monnaie puis on convertit par paquets (10 laits -> 1 steak). */
function addRaw(amount){
  const a=act();
  if(a.sub){
    S['sub_'+a.key]+=amount;
    if(S['sub_'+a.key] >= a.sub.per){
      const n=Math.floor(S['sub_'+a.key]/a.sub.per);
      S['sub_'+a.key]-=n*a.sub.per;
      setCur(curVal()+n);
      S['earned_'+a.key]+=n;
    }
  } else {
    setCur(curVal()+amount);
    S['earned_'+a.key]+=amount;
  }
}
function tick(dt){
  const a=act(), mult=globalMult();
  // du haut vers le bas : chaque tier alimente le tier du dessous
  for(let i=a.tiers.length-1;i>=1;i--){
    const up=a.tiers[i], down=a.tiers[i-1];
    S.buildings[down.id].amount += S.buildings[up.id].amount * up.rate * dt;
  }
  // tier 0 -> production (lait pour l'acte 1, sinon monnaie directe)
  const t0=a.tiers[0];
  addRaw(S.buildings[t0.id].amount * t0.rate * dt * mult);

  // endgame : la singularité — l'IA prend le contrôle (une seule fois)
  if(a.endgame && amountOf(a.endgame.tier)>=a.endgame.n && !finaleStarted && !S.finaleSeen){
    startFinale();
  }
}
/* production du tier 0 par seconde, dans son unité (lait pour l'acte 1) */
function perSecond(){
  const a=act(), t0=a.tiers[0];
  return S.buildings[t0.id].amount * t0.rate * globalMult();
}

/* ---- ACHATS ---- */
let buyMode='1';
function buy(t){
  if(!isRevealed(t)) return;
  let k = buyMode==='max' ? maxAffordable(t) : parseInt(buyMode);
  if(k<1) return;
  if(buyMode!=='max'){ // vérifie qu'on peut payer les k
    while(k>0 && bulkCost(t,k)>curVal()) k--;
  }
  if(k<1) return;
  const cost=bulkCost(t,k);
  if(cost>curVal()) return;
  setCur(curVal()-cost);
  S.buildings[t.id].bought+=k;
  S.buildings[t.id].amount+=k;
  renderShop(); save();
}
function buyBonus(){
  const b=act().bonus; if(!b) return;
  const lvl=S.bonus[b.id]||0;
  const cost=b.base*Math.pow(b.mul,lvl);
  if(cost>curVal()) return;
  setCur(curVal()-cost);
  S.bonus[b.id]=lvl+1;
  renderShop(); save();
}
function investNext(){
  const nx=act().next; if(!nx) return;
  if(curVal()<nx.cost) return;
  S.act++;
  document.body.className = S.act===1?'act-1':S.act===2?'act-2':'';
  clearFloaters();
  announced = new Set();               // nouvel acte : on repart de zéro pour les signalements
  showMilestone(ACTS[S.act].cur.emoji, ACTS[S.act].title);
  renderAll(); checkAnnounce(true); save();
}

/* ---- FLOATERS (vache/puce/code qui traversent) ---- */
let autoCollect=0;
let finaleStarted=false, finaleAutoBuy=0;   // déclaré tôt : tick() y accède dès la progression hors-ligne
function clearFloaters(){ pasture.querySelectorAll('.floater').forEach(f=>f.remove()); }
function rand(a,b){ return Math.random()*(b-a)+a; }
function playMoo(){ try{ new Audio(SOUNDS[Math.floor(Math.random()*SOUNDS.length)]).play().catch(()=>{}); }catch(e){} }

const CODE_SNIPPETS=[
  '<span class="k">def</span> <span class="f">train</span>():',
  '<span class="k">while</span> <span class="k">True</span>:',
  '<span class="k">import</span> <span class="s">torch</span>',
  'model.<span class="f">fit</span>(x, y)',
  '<span class="k">return</span> steak',
  'AGI = <span class="k">True</span>',
];

function spawnFloater(){
  const a=act();
  const ltr=Math.random()<0.5;
  const el=document.createElement('div');
  el.className='floater '+(ltr?'ltr':'rtl');
  const top=rand(4,80);
  const dur=rand(13,25);
  el.style.cssText=`top:${top}vh;animation-duration:${dur}s;`;

  if(a.entity==='cow'){
    el.classList.add('cow');
    el.style.width=rand(8,15)+'vw';
    const img=document.createElement('img'); img.src='vache.png'; img.alt='Vache'; img.draggable=false;
    el.appendChild(img);
  } else if(a.entity==='chip'){
    el.classList.add('chip'); el.textContent='NVIDIA';
  } else {
    el.classList.add('code');
    el.innerHTML=CODE_SNIPPETS[Math.floor(Math.random()*CODE_SNIPPETS.length)];
  }

  el.addEventListener('click', e=>{ e.stopPropagation(); collect(el, e.clientX, e.clientY); });
  el.addEventListener('animationend', ()=>el.remove());
  pasture.appendChild(el);
}

function collect(el, x, y){
  const a=act();
  // le clic donne 1 unité brute (1 lait pour l'acte 1), plus un bonus tardif
  const reward = Math.max(a.clickBase, Math.floor(perSecond()*0.05));
  addRaw(reward);

  if(a.entity==='cow') playMoo();
  const gainEmoji = a.sub ? a.sub.emoji : a.cur.emoji;

  // bulle
  const old=el.querySelector('.bubble'); if(old) old.remove();
  const b=document.createElement('div'); b.className='bubble';
  b.textContent = a.entity==='cow' ? MEUHS[Math.floor(Math.random()*MEUHS.length)] : (a.entity==='chip'?'⚙️ +'+fmt(reward):'</> +'+fmt(reward));
  el.appendChild(b);
  b.addEventListener('animationend',()=>b.remove());

  // +gain flottant
  if(x!=null){
    const g=document.createElement('div'); g.className='gain-pop';
    g.textContent='+'+fmt(reward)+' '+gainEmoji;
    g.style.left=x+'px'; g.style.top=y+'px';
    document.body.appendChild(g);
    g.addEventListener('animationend',()=>g.remove());
  }
  updateHUD();
}

/* ---- MILESTONE ---- */
function showMilestone(emoji,label){
  const el=document.createElement('div'); el.className='milestone-popup';
  el.innerHTML=`${emoji}<br><span>${label}</span>`;
  document.body.appendChild(el);
  el.addEventListener('animationend',()=>el.remove());
}

/* ---- RENDU ---- */
function updateHUD(){
  const a=act();
  hudCur.textContent = fmt(Math.floor(curVal()))+' '+a.cur.emoji;
  const ps=perSecond();
  if(a.sub){
    // acte 1 : montre la progression du lait vers le prochain steak + le débit de lait
    const s=Math.floor(S['sub_'+a.key]);
    const bits=[a.sub.emoji+' '+s+'/'+a.sub.per];
    if(ps>0) bits.push('+'+fmt(ps)+' '+a.sub.emoji+'/s');
    else bits.push('clique les vaches');
    hudRate.textContent = bits.join(' · ');
  } else {
    hudRate.textContent = ps>0 ? ('+'+fmt(ps)+' '+a.cur.name+'/s') : ('clique les '+(a.entity==='chip'?'puces':'lignes de code'));
  }
}
function itemRow(t){
  const st=S.buildings[t.id];
  if(!isRevealed(t)){
    const need=t.revealBy;
    const needCfg=tierCfg(need.tier);
    const div=document.createElement('div'); div.className='item locked';
    div.innerHTML=`<div class="item-emoji">🔒</div><div class="item-name">???</div><div class="item-owned"></div><div class="item-desc">Débloqué à ${need.n} ${needCfg.name.toLowerCase()}${need.n>1?'s':''}</div>`;
    return div;
  }
  let k = buyMode==='max'? Math.max(1,maxAffordable(t)) : parseInt(buyMode);
  const cost = bulkCost(t, Math.max(1,k));
  const can = cost<=curVal() && (buyMode!=='max'||maxAffordable(t)>=1);
  const div=document.createElement('div');
  div.className='item '+(can?'affordable':'cant');
  const idx = act().tiers.indexOf(t);
  const t0unit = act().sub ? act().sub.name : act().cur.name;  // le tier 0 produit du lait à l'acte 1
  // unité produite par ce bâtiment + débit unitaire et total
  const outUnit = idx===0 ? t0unit : tierCfg(act().tiers[idx-1].id).name.toLowerCase()+'s';
  const eachRate = idx===0 ? t.rate*globalMult() : t.rate;
  const total = st.amount * eachRate;
  const perEach = `${fmt(eachRate)} ${outUnit}/s`;
  // ligne "combien tu gagnes par seconde au total" (seulement si tu en possèdes)
  const prodLine = st.amount>=1 ? `<div class="item-prod">▲ +${fmt(total)} ${outUnit}/s au total</div>` : '';
  div.innerHTML=`
    <div class="item-emoji">${t.emoji}</div>
    <div class="item-name">${t.name}</div>
    <div class="item-owned">${fmt(Math.floor(st.amount))}</div>
    <div class="item-desc">${t.desc} <b style="color:var(--ink-soft)">(${perEach} chacun)</b></div>
    ${prodLine}
    <div class="item-cost">${buyMode==='max'?'Max '+k+' · ':''}${fmt(Math.ceil(cost))} ${act().cur.emoji}</div>`;
  if(can) div.onclick=()=>buy(t);
  return div;
}
function bonusRow(){
  const b=act().bonus; if(!b) return null;
  const lvl=S.bonus[b.id]||0;
  const cost=b.base*Math.pow(b.mul,lvl);
  const can=cost<=curVal();
  const div=document.createElement('div');
  div.className='item bonus '+(can?'affordable':'cant');
  div.innerHTML=`
    <div class="item-emoji">${b.emoji}</div>
    <div class="item-name">${b.name} <span style="font-weight:400;color:var(--ink-soft)">niv. ${lvl}</span></div>
    <div class="item-owned">×${(globalMult()).toFixed(2)}</div>
    <div class="item-desc">${b.desc}</div>
    <div class="item-cost">${fmt(Math.ceil(cost))} ${act().cur.emoji}</div>`;
  if(can) div.onclick=buyBonus;
  return div;
}
function nextRow(){
  const nx=act().next; if(!nx) return null;
  const can=curVal()>=nx.cost;
  const div=document.createElement('div');
  div.className='item next '+(can?'affordable':'cant');
  div.innerHTML=`<div class="n-title">${nx.title}</div><div class="n-flavor">${nx.flavor}</div><div class="n-cost">${fmt(Math.ceil(nx.cost))} ${act().cur.emoji}</div>`;
  if(can) div.onclick=investNext;
  return div;
}
function renderShop(){
  const a=act();
  updateShopScore();   /* l'entête affiche le score live au lieu du mot "Boutique" */
  shopList.innerHTML='';
  a.tiers.forEach(t=> shopList.appendChild(itemRow(t)));
  const br=bonusRow(); if(br) shopList.appendChild(br);
  const nr=nextRow(); if(nr) shopList.appendChild(nr);
}
function renderAll(){
  actNameEl.textContent = act().title;
  updateHUD(); renderShop(); updateBadge();
}

/* ---- INDICATEUR "ACHAT POSSIBLE" ---- */
const shopBadge = document.getElementById('shop-badge');
let announced = new Set();  // ids déjà signalés dans l'acte courant
function isAffordable(t){ return isRevealed(t) && costOf(t)<=curVal(); }
function affordableCount(){
  const a=act(); let n=0;
  a.tiers.forEach(t=>{ if(isAffordable(t)) n++; });
  if(a.bonus){ const b=a.bonus; if(b.base*Math.pow(b.mul,S.bonus[b.id]||0)<=curVal()) n++; }
  if(a.next && curVal()>=a.next.cost) n++;
  return n;
}
function updateBadge(){
  if(shopEl.classList.contains('open')){ shopBadge.classList.remove('on'); return; }
  const n=affordableCount();
  if(n>0){ shopBadge.textContent=n; shopBadge.classList.add('on'); }
  else shopBadge.classList.remove('on');
}
/* popup la 1re fois qu'un truc devient achetable */
function checkAnnounce(silent){
  const a=act();
  const items=[...a.tiers.map(t=>({id:t.id, ok:isAffordable(t), emoji:t.emoji, name:t.name}))];
  if(a.bonus){ const b=a.bonus; items.push({id:b.id, ok:b.base*Math.pow(b.mul,S.bonus[b.id]||0)<=curVal(), emoji:b.emoji, name:b.name}); }
  if(a.next){ items.push({id:'__next', ok:curVal()>=a.next.cost, emoji:'🚀', name:a.next.title}); }
  items.forEach(it=>{
    if(it.ok && !announced.has(it.id)){
      announced.add(it.id);
      if(!silent) showMilestone(it.emoji, it.name+' disponible !');
    } else if(!it.ok){
      announced.delete(it.id); // redeviendra signalable si on redescend sous le prix
    }
  });
}

/* ---- RACCOURCIS D'ACHAT (sous le bouton Boutique) ---- */
const quickBuy = document.getElementById('quick-buy');
function renderQuickBuy(){
  if(shopEl.classList.contains('open') || finaleStarted){ quickBuy.innerHTML=''; return; }
  const a=act();
  const items=[];
  a.tiers.forEach(t=>{ if(isAffordable(t)) items.push({emoji:t.emoji, name:t.name, cost:costOf(t), fn:()=>buy(t)}); });
  if(a.bonus){ const b=a.bonus, c=b.base*Math.pow(b.mul,S.bonus[b.id]||0); if(c<=curVal()) items.push({emoji:b.emoji, name:b.name, cost:c, fn:buyBonus}); }
  let nextItem=null;
  if(a.next && curVal()>=a.next.cost) nextItem={emoji:'🚀', name:a.next.title, cost:a.next.cost, fn:investNext};
  quickBuy.innerHTML='';
  items.forEach(it=>{
    const btn=document.createElement('button'); btn.className='qbtn';
    btn.innerHTML=`<span class="qn">${it.emoji} ${it.name}</span><span class="qc">${fmt(Math.ceil(it.cost))} ${a.cur.emoji}</span>`;
    btn.onclick=()=>{ it.fn(); renderQuickBuy(); };
    quickBuy.appendChild(btn);
  });
  if(nextItem){
    const btn=document.createElement('button'); btn.className='qbtn qnext';
    btn.innerHTML=`<span class="qn">${nextItem.emoji} ${nextItem.name}</span><span class="qc">${fmt(Math.ceil(nextItem.cost))} ${a.cur.emoji}</span>`;
    btn.onclick=()=>{ nextItem.fn(); renderQuickBuy(); };
    quickBuy.appendChild(btn);
  }
}

/* ---- PROGRESSION HORS-LIGNE (marche sur ordinateur ET téléphone) ---- */
(function offline(){
  const dt=Math.min((Date.now()-(S.lastTs||Date.now()))/1000, 8*3600); // plafonné à 8 h
  if(dt<=5) return;
  const a=act(), key=a.key, before=S['earned_'+key];
  const steps=Math.min(600, Math.max(1, Math.round(dt)));  // on simule par petits pas → la production à étages se compose correctement
  const sdt=dt/steps;
  for(let i=0;i<steps;i++) tick(sdt);
  const gained=S['earned_'+key]-before;
  if(gained>0) setTimeout(()=>showMilestone('💤', 'De retour ! +'+fmt(gained)+' '+a.cur.emoji+' pendant ton absence'), 500);
})();

/* ---- FINALE : la singularité ---- */
function fadingNow(){ return finaleEl.classList.contains('fading'); }
function cheapestAffordable(){
  const a=act(); let best=null, bestCost=Infinity;
  a.tiers.forEach(t=>{ if(isRevealed(t)){ const c=costOf(t); if(c<=curVal() && c<bestCost){ best=t; bestCost=c; } } });
  return best;
}
function goBlackScreen(){                       // fond noir + message final
  document.body.classList.remove('omniscient');
  endgameEl.classList.remove('on');
  finaleEl.classList.add('fading');
  setTimeout(()=>document.getElementById('finale-restart').classList.add('show'), 6000);
}
function startFinale(){
  if(finaleStarted) return;
  finaleStarted=true;
  document.body.classList.add('finale');
  closeShop();
  endgameEl.textContent='🤖 L\'IA a pris le contrôle. Elle joue à ta place…';
  endgameEl.classList.add('on');
  setTimeout(()=>{ endgameEl.textContent='🧠 Elle apprend de chaque clic. Elle s\'améliore toute seule.'; }, 6500);
  setTimeout(()=>{ endgameEl.textContent='🌐 Elle voit tout. Elle sait tout. Elle est partout.'; document.body.classList.add('omniscient'); }, 13000);
  setTimeout(()=>{ endgameEl.textContent='∎ Prise de contrôle du réseau mondial…'; }, 18500);
  setTimeout(()=>{ S.finaleSeen=true; save(); goBlackScreen(); }, 21000);
}
document.getElementById('finale-restart').onclick=()=>{ localStorage.removeItem(SAVE_KEY); location.reload(); };

/* ---- BOUCLE ---- */
document.body.className = S.act===1?'act-1':S.act===2?'act-2':'';
renderAll();
renderQuickBuy();
checkAnnounce(true);   // ne pas spammer au chargement : on marque ce qui est déjà achetable
if(S.finaleSeen){ finaleStarted=true; goBlackScreen(); }  // déjà terminé : on remontre l'écran final
let last=performance.now(), acc=0, shopAcc=0, badgeAcc=0;
function loop(now){
  const dt=Math.min((now-last)/1000,0.25); last=now;
  tick(dt);
  updateHUD();
  // pendant la finale : l'IA joue toute seule — ramasse tout et achète en boucle
  if(finaleStarted && !fadingNow()){
    pasture.querySelectorAll('.floater').forEach(f=>{ collect(f,null); f.remove(); });
    finaleAutoBuy+=dt;
    if(finaleAutoBuy>=0.2){ finaleAutoBuy=0; const t=cheapestAffordable(); if(t) buy(t); }
  }
  if(shopEl.classList.contains('open')){
    updateShopScore();                                    // score live en haut de la boutique
    shopAcc+=dt; if(shopAcc>=0.4){ shopAcc=0; renderShop(); }
  }
  badgeAcc+=dt; if(badgeAcc>=0.3){ badgeAcc=0; checkAnnounce(false); updateBadge(); renderQuickBuy(); }
  acc+=dt; if(acc>=5){ acc=0; save(); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---- SPAWN ---- */
function scheduleSpawn(){
  spawnFloater();
  let gap;
  if(finaleStarted && !fadingNow()) gap=rand(90,220);          // déluge pendant la singularité
  else if(act().endgame && amountOf(act().endgame.tier)>=act().endgame.n) gap=rand(500,1000);
  else gap=rand(1400,2600);
  if(fadingNow()) return;                                       // écran final : on arrête de spawner
  setTimeout(scheduleSpawn, gap);
}
for(let i=0;i<4;i++) setTimeout(spawnFloater, i*500);
setTimeout(scheduleSpawn, 1500);
window.addEventListener('beforeunload', save);
document.addEventListener('visibilitychange', ()=>{ if(document.hidden) save(); }); /* sauve à chaque fois qu'on quitte l'onglet */
</script>
<script>
/* Bloque le zoom à deux doigts (pinch) sur mobile, sans empêcher le défilement à un doigt.
   (le double-tap est bloqué par user-scalable=no dans le viewport) */
['gesturestart','gesturechange','gestureend'].forEach(function(ev){
  document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
});
document.addEventListener('touchmove', function(e){
  if(e.touches.length>1) e.preventDefault();
}, {passive:false});
</script>
