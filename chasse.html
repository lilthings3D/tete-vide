<div id="stage">

<script>
/* =====================================================================
   CHASSE À LA MAIN — tir façon Duck Hunt, visée à la webcam (MediaPipe)
   avec repli souris / tactile.
   ===================================================================== */
const stage   = document.getElementById('stage');
const canvas  = document.getElementById('game');
const ctx     = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const ovStatus= document.getElementById('ov-status');
const ovFinal = document.getElementById('ov-final');
const ovKeys  = document.getElementById('ov-keys');
const ovSub   = document.getElementById('ov-sub');
const camWrap = document.getElementById('cam-wrap');
const camCanvas = document.getElementById('cam');
const cctx    = camCanvas.getContext('2d');
const hudScore= document.getElementById('hud-score');
const hudTime = document.getElementById('hud-time');
const hudAcc  = document.getElementById('hud-acc');
const bestEl  = document.getElementById('best');

const GAME_TIME = 60;
let W=0, H=0;
let running=false, mode=null;             // 'cam' | 'mouse'
let score=0, shots=0, hits=0, timeLeft=GAME_TIME;
let ducks=[], flashes=[], puffs=[];
let aimX=0, aimY=0, targetAimX=0, targetAimY=0, handSeen=false;
let lastFire=0, spawnT=0, gameStart=0;
let best = +(localStorage.getItem('chasse-best')||0);
bestEl.textContent = best;

/* ---- caméra / MediaPipe ---- */
let handLandmarker=null, video=null, lastVideoTime=-1, wasPinch=false;

function resize(){
  W = canvas.width  = stage.clientWidth;
  H = canvas.height = stage.clientHeight;
}
window.addEventListener('resize', resize);
resize();
aimX=targetAimX=W/2; aimY=targetAimY=H/2;

async function initCamera(){
  ovStatus.textContent = 'Autorisation de la caméra…';
  const stream = await navigator.mediaDevices.getUserMedia({ video:{ facingMode:'user', width:640, height:480 } });
  video = document.createElement('video');
  video.autoplay=true; video.playsInline=true; video.muted=true; video.srcObject=stream;
  await new Promise(res=>{ video.onloadedmetadata=()=>res(); });
  await video.play();
  ovStatus.textContent = 'Chargement du détecteur de main…';
  const vision = await import('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14');
  const { HandLandmarker, FilesetResolver } = vision;
  const resolver = await FilesetResolver.forVisionTasks('https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm');
  handLandmarker = await HandLandmarker.createFromOptions(resolver, {
    baseOptions:{ modelAssetPath:'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task', delegate:'GPU' },
    runningMode:'VIDEO', numHands:1
  });
}

function readHand(){
  if(!handLandmarker || !video || video.currentTime===lastVideoTime) return;
  lastVideoTime = video.currentTime;
  let res;
  try{ res = handLandmarker.detectForVideo(video, performance.now()); }catch(e){ return; }
  drawCamPreview(res);
  if(res && res.landmarks && res.landmarks.length){
    const lm = res.landmarks[0];
    const tip = lm[8], thumb = lm[4];
    targetAimX = (1 - tip.x) * W;      // miroir (selfie)
    targetAimY = tip.y * H;
    handSeen = true;
    const pinch = Math.hypot(tip.x-thumb.x, tip.y-thumb.y);
    const isPinch = pinch < 0.06;
    if(isPinch && !wasPinch) fire();
    wasPinch = isPinch;
  } else {
    handSeen = false; wasPinch = false;
  }
}

function drawCamPreview(res){
  const pw=camCanvas.width, ph=camCanvas.height;
  cctx.save(); cctx.scale(-1,1); cctx.drawImage(video,-pw,0,pw,ph); cctx.restore();
  if(res && res.landmarks && res.landmarks.length){
    const lm=res.landmarks[0];
    const px=i=>(1-lm[i].x)*pw, py=i=>lm[i].y*ph;
    // squelette simplifié
    const bones=[[0,5],[5,6],[6,7],[7,8],[0,17],[0,9],[9,10],[10,11],[11,12],[0,1],[1,2],[2,3],[3,4]];
    cctx.strokeStyle='rgba(255,255,255,.7)'; cctx.lineWidth=1.5;
    cctx.beginPath(); bones.forEach(([a,b])=>{cctx.moveTo(px(a),py(a));cctx.lineTo(px(b),py(b));}); cctx.stroke();
    // index (viseur) + pouce
    cctx.fillStyle='#ff3b30'; cctx.beginPath(); cctx.arc(px(8),py(8),4,0,7); cctx.fill();
    cctx.fillStyle='#ffd23b'; cctx.beginPath(); cctx.arc(px(4),py(4),3,0,7); cctx.fill();
  }
}

/* ---- souris / tactile ---- */
function setupPointer(){
  const move=(x,y)=>{ const r=canvas.getBoundingClientRect(); targetAimX=x-r.left; targetAimY=y-r.top; aimX=targetAimX; aimY=targetAimY; };
  canvas.addEventListener('mousemove', e=> move(e.clientX,e.clientY));
  canvas.addEventListener('mousedown', e=>{ move(e.clientX,e.clientY); fire(); });
  canvas.addEventListener('touchstart', e=>{ e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY); fire(); }, {passive:false});
  canvas.addEventListener('touchmove',  e=>{ e.preventDefault(); const t=e.touches[0]; move(t.clientX,t.clientY); }, {passive:false});
}
setupPointer();

/* ---- son ---- */
let actx=null;
function sfx(type){
  try{
    actx = actx || new (window.AudioContext||window.webkitAudioContext)();
    const t=actx.currentTime, o=actx.createOscillator(), g=actx.createGain();
    o.connect(g); g.connect(actx.destination);
    if(type==='shot'){ o.type='square'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(60,t+.12); g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.001,t+.13); o.start(t); o.stop(t+.14); }
    else if(type==='hit'){ o.type='sawtooth'; o.frequency.setValueAtTime(520,t); o.frequency.exponentialRampToValueAtTime(120,t+.25); g.gain.setValueAtTime(.16,t); g.gain.exponentialRampToValueAtTime(.001,t+.28); o.start(t); o.stop(t+.29); }
  }catch(e){}
}

/* ---- gameplay ---- */
function spawnDuck(){
  const fromLeft = Math.random()<0.5;
  const speed = (0.9 + Math.random()*0.9) * (W/900) * (1 + (GAME_TIME-timeLeft)/120); // accélère avec le temps
  const r = 26 + Math.random()*10;
  const baseY = H*0.14 + Math.random()*H*0.5;
  ducks.push({
    x: fromLeft? -40 : W+40,
    y: baseY, baseY,
    vx: (fromLeft?1:-1) * (2.4+speed) ,
    amp: 20+Math.random()*40, freq: 0.006+Math.random()*0.006, phase: Math.random()*7,
    r, flap:0, alive:true, falling:false, fallV:0, points: Math.round(60 - r) + 20
  });
}

function fire(){
  if(!running) return;
  const now=performance.now();
  if(now-lastFire < 260) return;         // cadence
  lastFire=now; shots++; sfx('shot');
  flashes.push({x:aimX,y:aimY,t:1});
  // canard le plus proche sous le viseur
  let best=null, bd=1e9;
  for(const d of ducks){ if(!d.alive) continue; const dist=Math.hypot(d.x-aimX,d.y-aimY); if(dist<d.r+16 && dist<bd){bd=dist;best=d;} }
  if(best){
    best.alive=false; best.falling=true; best.fallV=-2; hits++;
    score += best.points; sfx('hit');
    puffs.push({x:best.x,y:best.y,t:1});
    hudScore.textContent=score;
  }
  updateAcc();
}
function updateAcc(){ hudAcc.textContent = shots? Math.round(hits/shots*100)+'%' : '—'; }

function startGame(m){
  mode=m;
  overlay.classList.add('hidden');
  camWrap.classList.toggle('on', m==='cam');
  score=0;shots=0;hits=0;timeLeft=GAME_TIME;ducks=[];flashes=[];puffs=[];
  hudScore.textContent='0'; hudTime.textContent=GAME_TIME; hudAcc.textContent='—';
  spawnT=0; gameStart=performance.now(); running=true;
  spawnDuck();
}

function endGame(){
  running=false;
  if(score>best){ best=score; localStorage.setItem('chasse-best',best); bestEl.textContent=best; }
  ovKeys.style.display='none'; ovSub.style.display='none';
  document.getElementById('btn-cam').textContent = mode==='cam'?'🎥 Rejouer (caméra)':'🎥 Jouer avec la caméra';
  document.getElementById('btn-mouse').textContent = mode==='mouse'?'🖱️ Rejouer (souris/tactile)':'🖱️ Jouer à la souris / au doigt';
  ovFinal.style.display='block';
  ovFinal.innerHTML = `<span class="big">${score}</span> canards abattus : ${hits} · tirs : ${shots} · précision ${shots?Math.round(hits/shots*100):0}%` + (score>=best?'<br>🏆 Nouveau record !':'');
  overlay.classList.remove('hidden');
  camWrap.classList.remove('on');
}

/* ---- dessin ---- */
function drawBackground(){
  const g=ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#8fd0ee'); g.addColorStop(.6,'#bfe6f5'); g.addColorStop(1,'#e7f5df');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H);
  // soleil
  ctx.fillStyle='rgba(255,244,200,.8)'; ctx.beginPath(); ctx.arc(W*0.82,H*0.2,46,0,7); ctx.fill();
  // nuages
  ctx.fillStyle='rgba(255,255,255,.75)';
  cloud(W*0.2,H*0.22,1); cloud(W*0.55,H*0.14,.8); cloud(W*0.75,H*0.42,1.1);
  // herbe / buissons
  ctx.fillStyle='#5c8a3a'; ctx.fillRect(0,H-48,W,48);
  ctx.fillStyle='#4a7530';
  for(let x=-20;x<W+40;x+=70){ ctx.beginPath(); ctx.arc(x,H-48,34,Math.PI,0); ctx.fill(); }
}
function cloud(x,y,s){ ctx.beginPath(); ctx.ellipse(x,y,40*s,20*s,0,0,7); ctx.ellipse(x+30*s,y+6*s,28*s,16*s,0,0,7); ctx.ellipse(x-30*s,y+6*s,26*s,15*s,0,0,7); ctx.fill(); }

function drawDuck(d){
  ctx.save(); ctx.translate(d.x,d.y);
  const dir=d.vx>0?1:-1; ctx.scale(dir,1);
  if(d.falling) ctx.rotate(0.5);
  const s=d.r/24; ctx.scale(s,s);
  const flap = d.falling? 0.15 : Math.sin(d.flap)*0.85;
  ctx.fillStyle='#8a6038'; ctx.save(); ctx.rotate(flap); ctx.beginPath(); ctx.ellipse(-4,-4,16,8,0,0,7); ctx.fill(); ctx.restore(); // aile arrière
  ctx.fillStyle='#7a5230'; ctx.beginPath(); ctx.ellipse(0,0,24,16,0,0,7); ctx.fill();                                          // corps
  ctx.fillStyle='#f2e7d2'; ctx.beginPath(); ctx.ellipse(-4,6,16,8,0,0,7); ctx.fill();                                          // ventre
  ctx.fillStyle='#9a7048'; ctx.save(); ctx.rotate(-flap); ctx.beginPath(); ctx.ellipse(-2,-2,15,7,0,0,7); ctx.fill(); ctx.restore(); // aile avant
  ctx.fillStyle='#2e6b3a'; ctx.beginPath(); ctx.arc(20,-11,10,0,7); ctx.fill();                                                // tête
  ctx.fillStyle='#e6a53a'; ctx.beginPath(); ctx.moveTo(29,-11); ctx.lineTo(38,-9); ctx.lineTo(29,-6); ctx.closePath(); ctx.fill(); // bec
  if(d.falling){ ctx.strokeStyle='#111'; ctx.lineWidth=1.6; ctx.beginPath(); ctx.moveTo(19,-14);ctx.lineTo(23,-10);ctx.moveTo(23,-14);ctx.lineTo(19,-10); ctx.stroke(); }
  else { ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(22,-12,1.8,0,7); ctx.fill(); }
  ctx.restore();
}

function drawCrosshair(){
  const x=aimX,y=aimY;
  const dim = (mode==='cam' && !handSeen);
  ctx.globalAlpha = dim?0.3:1;
  ctx.strokeStyle='#e11'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(x,y,16,0,7); ctx.stroke();
  ctx.beginPath(); ctx.arc(x,y,3,0,7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(x-24,y); ctx.lineTo(x-8,y); ctx.moveTo(x+8,y); ctx.lineTo(x+24,y);
  ctx.moveTo(x,y-24); ctx.lineTo(x,y-8); ctx.moveTo(x,y+8); ctx.lineTo(x,y+24); ctx.stroke();
  ctx.globalAlpha=1;
}

/* ---- boucle ---- */
let last=performance.now();
function loop(now){
  const dt=Math.min((now-last)/16.67, 3); last=now;

  if(mode==='cam') readHand();
  aimX += (targetAimX-aimX)*(mode==='cam'?0.35:1);
  aimY += (targetAimY-aimY)*(mode==='cam'?0.35:1);

  if(running){
    timeLeft = Math.max(0, GAME_TIME - (now-gameStart)/1000);
    hudTime.textContent = Math.ceil(timeLeft);
    // spawn
    spawnT += dt*16.67;
    const interval = Math.max(520, 1300 - (GAME_TIME-timeLeft)*13);
    if(spawnT>interval){ spawnT=0; spawnDuck(); if(Math.random()<0.25) spawnDuck(); }
    // ducks
    for(const d of ducks){
      d.flap += 0.3*dt;
      if(d.falling){ d.fallV += 0.5*dt; d.y += d.fallV*dt; }
      else { d.x += d.vx*dt; d.y = d.baseY + Math.sin(d.phase + d.x*d.freq)*d.amp; }
    }
    ducks = ducks.filter(d=>{
      if(d.falling) return d.y < H+60;
      const gone = d.x < -60 || d.x > W+60;
      return !gone;
    });
    if(timeLeft<=0) endGame();
  }

  // rendu
  drawBackground();
  for(const d of ducks) drawDuck(d);
  // puffs (plumes)
  puffs.forEach(p=>{ p.t-=0.04*dt; ctx.globalAlpha=Math.max(0,p.t); ctx.fillStyle='#fff'; for(let i=0;i<6;i++){const a=i/6*7;ctx.beginPath();ctx.arc(p.x+Math.cos(a)*(1-p.t)*30,p.y+Math.sin(a)*(1-p.t)*30,4,0,7);ctx.fill();} ctx.globalAlpha=1; });
  puffs=puffs.filter(p=>p.t>0);
  // flash
  flashes.forEach(f=>{ f.t-=0.12*dt; ctx.globalAlpha=Math.max(0,f.t); ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(f.x,f.y,26*f.t+6,0,7); ctx.fill(); ctx.globalAlpha=1; });
  flashes=flashes.filter(f=>f.t>0);
  if(running || mode) drawCrosshair();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ---- boutons ---- */
document.getElementById('btn-cam').addEventListener('click', async ()=>{
  ovFinal.style.display='none';
  if(handLandmarker){ startGame('cam'); return; }   // déjà prêt → rejouer
  const btn=document.getElementById('btn-cam'); btn.disabled=true;
  try{
    await initCamera();
    ovStatus.textContent='';
    startGame('cam');
  }catch(err){
    console.warn('caméra/MediaPipe indisponible', err);
    ovStatus.innerHTML = (err && err.name==='NotAllowedError')
      ? "Caméra refusée. Tu peux jouer à la souris / au doigt ci-dessous 👇"
      : "Impossible d'activer la caméra ici. Joue à la souris / au doigt 👇";
  }
  btn.disabled=false;
});
document.getElementById('btn-mouse').addEventListener('click', ()=>{ ovFinal.style.display='none'; startGame('mouse'); });

/* anti pinch-zoom mobile */
['gesturestart','gesturechange','gestureend'].forEach(ev=>document.addEventListener(ev,e=>e.preventDefault(),{passive:false}));
document.addEventListener('touchmove',e=>{ if(e.touches.length>1) e.preventDefault(); },{passive:false});
</script>
