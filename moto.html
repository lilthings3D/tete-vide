<style>
  :root{
    --cream:#FBF7F0;--ink:#2e2218;--ink-soft:#5b4a39;

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
if (!ctx.roundRect) CanvasRenderingContext2D.prototype.roundRect = function(x,y,w,h,r){
  this.moveTo(x+r,y); this.arcTo(x+w,y,x+w,y+h,r); this.arcTo(x+w,y+h,x,y+h,r);
  this.arcTo(x,y+h,x,y,r); this.arcTo(x,y,x+w,y,r); this.closePath(); return this;
};
const controls = document.getElementById('controls');
const overMsg = document.getElementById('over-msg');
const btnStart = document.getElementById('btn-start');
const nameEntry = document.getElementById('name-entry');
const playerNameInput = document.getElementById('player-name');
const btnSubmit = document.getElementById('btn-submit-score');
const btnSkip = document.getElementById('btn-skip');
const distVal = document.getElementById('dist-val');
const flipsVal = document.getElementById('flips-val');
const lbBody = document.getElementById('lb-body');
const IS_TOUCH = window.matchMedia('(pointer:coarse)').matches;

/* ---- LEADERBOARD (clé dynamique : libre = 'moto', jour = 'moto-jour-DATE') ---- */
const LB_URL = 'https://script.google.com/macros/s/AKfycbwyBOl_zvYu9U7LciBuBeQhta19z1lWJ7hXr7KYFmfaWCc_ZnV_QIUoU-wri5Pu4Ps/exec';
const lbTitle = document.getElementById('lb-title');
let mode = 'libre';
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function lbGame(){ return mode==='jour' ? 'moto-jour-'+todayStr() : 'moto'; }
function lbCacheKey(){ return 'lb-cache-'+lbGame(); }
function updateLbTitle(){ lbTitle.innerHTML = mode==='jour' ? 'Course du jour <b>·</b>' : 'Top 10 <b>·</b>'; }
function loadCache(){ try{ return JSON.parse(localStorage.getItem(lbCacheKey()))||[]; }catch{ return []; } }
function saveCache(e){ localStorage.setItem(lbCacheKey(), JSON.stringify(e)); }
function qualifies(sc,entries){ return sc>0&&(entries.length<10||sc>entries[entries.length-1].score); }
async function fetchLB(){
  try{ const r=await fetch(LB_URL+'?game='+lbGame()); const e=await r.json(); if(Array.isArray(e)){saveCache(e);return e;} return loadCache(); }catch{ return loadCache(); }
}
function addToLB(name,sc){
  const url=LB_URL+'?action=add&game='+lbGame()+'&name='+encodeURIComponent(name)+'&score='+sc;
  fetch(url).then(r=>r.json()).then(e=>{if(Array.isArray(e)){saveCache(e);renderLeaderboard(e,name);}}).catch(()=>{});
  const entries=[...loadCache(),{name,score:sc}].sort((a,b)=>b.score-a.score).slice(0,10);
  saveCache(entries); return entries;
}
function renderLeaderboard(entries,hl){const m=['🥇','🥈','🥉'];lbBody.innerHTML=entries.length?entries.map((e,i)=>`<tr class="${i===0?'lb-rank-1':''} ${hl&&e.name===hl?'lb-me':''}"><td>${m[i]||'#'+(i+1)}</td><td>${e.name}</td><td>${e.score}</td></tr>`).join(''):'<tr><td colspan="3" class="lb-empty">Pas encore de scores — sois le premier !</td></tr>';}

/* ================================================================
   MOTO BACKFLIP v3 — coucher de soleil, bonus boost, physique légère
   ================================================================ */
const W = 900, H = 450;
canvas.width = W; canvas.height = H;

function resize(){
  const arena = document.getElementById('arena');
  const sc = Math.min((arena.clientWidth-4)/W, (arena.clientHeight-4)/H, 1);
  canvas.style.width=(W*sc)+'px'; canvas.style.height=(H*sc)+'px';
}
window.addEventListener('resize', resize); resize();

function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};}

/* ---- palette coucher de soleil ---- */
const C = {
  skyTop:'#1c1038', skyMid:'#52245c', skyLow:'#b34a3c', skyHor:'#e8874f',
  sun:'#ffd27f', sunGlow:'rgba(255,170,90,0.35)',
  hillFar:'#3b1e4a', hillMid:'#291540',
  ground:'#241132', groundDeep:'#120a1e',
  rim:'#ff9d5c', rimGlow:'#ff7b3a',
  tree:'#170b26',
  dust:'#d9a066', popup:'#ffd866',
  ghost:'#7fd4ff',
};

/* ---- terrain ---- */
let terra, curSeed;
function makeTerrain(seed){
  curSeed = seed;
  const rnd = mulberry32(seed);
  const n = 4, amps=[], freqs=[], phases=[];
  const baseAmps=[85,45,22,10];
  const baseWave=[1600,700,320,150];
  for(let i=0;i<n;i++){
    amps.push(baseAmps[i]*(0.75+rnd()*0.5));
    freqs.push((2*Math.PI)/(baseWave[i]*(0.8+rnd()*0.5)));
    phases.push(rnd()*Math.PI*2);
  }
  terra = {amps,freqs,phases};
}
function groundY(x){
  let y = H*0.66;
  const difficulty = Math.min(1.5, 1 + x/25000);
  for(let i=0;i<terra.amps.length;i++)
    y += terra.amps[i]*difficulty*Math.sin(x*terra.freqs[i]+terra.phases[i]);
  return y;
}
function slopeAngle(x){
  const d=10;
  return Math.atan2(groundY(x+d)-groundY(x-d), 2*d);
}

/* ---- état ---- */
let bike, running, score, flips, flipPoints, boost, camX, camY, popups, crashT, dust;
let elapsed, recFrames, recT, ghostData;
let pickups, pickRnd, nextPickX, airTime, flipHintShown, finished;
let rw, fw, rotSum, lastAng, wasGnd, physAcc, airFlips; /* physique 2-roues */
const REC_DT = 60;
const RACE_M = 1000;                 // longueur de la course en mètres
const FINISH_X = 100 + RACE_M*10;    // x de la ligne d'arrivée (1 m = 10 px)

/* ================================================================
   ⚙ RÉGLAGES PHYSIQUE (modèle 2 roues — pas fixe de 16 ms)
   Les 3 chiffres à toucher, tout est en "pixels par frame" :
     • GRAV   = gravité. Plus PETIT = tombe plus lentement, vole plus longtemps.
     • CRUISE = vitesse normale (px par frame). Plus PETIT = plus lent.
     • BOOST  = vitesse en boost. Garder BOOST > CRUISE.
   ================================================================ */
const GRAV   = 0.30;   // gravité douce
const CRUISE = 3.4;    // ~205 px/s — moto tranquille
const BOOST  = 5.6;    // ~336 px/s

/* réglages avancés (à ne pas trop toucher) */
const WB = 34;         // empattement (écart entre les 2 roues)
const WR = 9;          // rayon de roue
const DRIVE = 0.20;    // accélération au sol
const AIR_SPIN = 0.14; // vitesse de rotation quand tu t'inclines (← / →)
const AIR_DAMP = 0.72; // amortissement quand tu ne touches rien (évite de tournoyer tout seul)
const CRASH_ANG = 2.2; // tolérance d'atterrissage en radians (~126°, crash si plus incliné)

function dateSeed(){
  const s = todayStr(); let h = 5381;
  for (let i=0;i<s.length;i++) h = ((h<<5)+h+s.charCodeAt(i))|0;
  return h>>>0;
}
function ghostKey(){ return 'moto-ghost-'+todayStr(); }
function loadGhost(){ try{ return JSON.parse(localStorage.getItem(ghostKey())); }catch{ return null; } }

function resetGame(){
  makeTerrain(mode==='jour' ? dateSeed() : (Math.random()*1e9)|0);
  const x0 = 100;
  /* deux roues posées sur le sol, vitesse initiale 1.5 px/frame vers la droite */
  rw = { x:x0-WB/2, y:groundY(x0-WB/2)-WR, px:0, py:0 };
  fw = { x:x0+WB/2, y:groundY(x0+WB/2)-WR, px:0, py:0 };
  rw.px = rw.x-1.5; rw.py = rw.y;
  fw.px = fw.x-1.5; fw.py = fw.y;
  bike = { x:x0, y:groundY(x0)-WR, angle:slopeAngle(x0), onGround:true, wheelRot:0 };
  rotSum=0; lastAng=slopeAngle(x0); wasGnd=true; physAcc=0; airFlips=0;
  running=false; score=0; flips=0; flipPoints=0; boost=100;
  camX=0; camY=bike.y-H*0.58;
  popups=[]; crashT=0; dust=[];
  elapsed=0; recFrames=[]; recT=0;
  ghostData = mode==='jour' ? loadGhost() : null;
  pickups=[]; pickRnd=mulberry32(curSeed^0x9E3779B9); nextPickX=650;
  airTime=0; flipHintShown=false; finished=false;
  distVal.textContent='0'; flipsVal.textContent='0';
}

function startGame(m){
  mode = m;
  resetGame();
  updateLbTitle();
  renderLeaderboard(loadCache());
  fetchLB().then(renderLeaderboard);
  overMsg.style.display='none';
  nameEntry.classList.remove('on');
  controls.classList.add('hidden');
  running=true;
  if (mode==='jour' && ghostData) addPopup('Fantôme : '+ghostData.score+' pts', C.ghost);
}
btnStart.addEventListener('click', ()=>startGame('libre'));
document.getElementById('btn-daily').addEventListener('click', ()=>startGame('jour'));

/* ---- contrôles ---- */
const keys={};
document.addEventListener('keydown', e=>{
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key]=true;
});
document.addEventListener('keyup', e=>{ keys[e.key]=false; });

function bindHold(id, obj){
  const el=document.getElementById(id); if(!el) return;
  const on=e=>{e.preventDefault();obj.a=true;};
  const off=e=>{e.preventDefault();obj.a=false;};
  el.addEventListener('touchstart',on,{passive:false});
  el.addEventListener('touchend',off,{passive:false});
  el.addEventListener('touchcancel',off,{passive:false});
  el.addEventListener('mousedown',on); el.addEventListener('mouseup',off); el.addEventListener('mouseleave',off);
}
const tLeft={a:false}, tRight={a:false}, tBoost={a:false};
bindHold('t-left',tLeft); bindHold('t-right',tRight); bindHold('t-boost',tBoost);

/* ← cabrer (rotation arrière / backflip) · → piquer (rotation avant / frontflip) */
function leanBackOn(){ return tLeft.a ||keys['ArrowLeft'] ||keys['a']||keys['A']; }
function leanFwdOn(){  return tRight.a||keys['ArrowRight']||keys['d']||keys['D']; }
function boostOn(){    return tBoost.a||keys[' ']||keys['ArrowUp']||keys['Shift']; }

/* ---- helpers ---- */
function normAngle(a){ while(a>Math.PI)a-=2*Math.PI; while(a<-Math.PI)a+=2*Math.PI; return a; }
function addPopup(txt, col){ popups.push({txt, col, x:bike.x, y:bike.y-52, t:1500}); }
function puff(n, spd){
  for(let i=0;i<n;i++){
    dust.push({
      x:bike.x-14+Math.random()*10, y:bike.y+16,
      vx:-(0.05+Math.random()*0.1)*(spd||1), vy:-(0.02+Math.random()*0.06),
      r:2+Math.random()*4, t:500+Math.random()*400,
    });
  }
}
function crash(){
  crashT = 1;
  running = false;
  puff(18, 2);
  setTimeout(endGame, 900);
}

/* ---- bonus de boost sur le tracé ---- */
function ensurePickups(){
  while (nextPickX < bike.x + 1400 && nextPickX < FINISH_X-200){
    const h = 24 + pickRnd()*100;
    pickups.push({ x:nextPickX, y:groundY(nextPickX)-h, taken:false });
    nextPickX += 450 + pickRnd()*500;
  }
  pickups = pickups.filter(p=>p.x > camX-100 && !p.taken);
}

/* ---- rotation rigide des 2 roues autour d'un centre ----
   damped=false : on tourne seulement la position → on injecte de la vitesse
   angulaire (le spin continue tout seul, effet momentum du backflip).
   damped=true  : on tourne aussi la position précédente → mouvement amorti
   vers une cible, sans momentum (auto-stabilisation). */
function rotateWheels(cx, cy, a, damped){
  const c=Math.cos(a), s=Math.sin(a);
  for (const w of [rw, fw]){
    let dx=w.x-cx, dy=w.y-cy;
    w.x=cx+dx*c-dy*s; w.y=cy+dx*s+dy*c;
    if (damped){
      let px=w.px-cx, py=w.py-cy;
      w.px=cx+px*c-py*s; w.py=cy+px*s+py*c;
    }
  }
}
function doFlip(dir){
  airFlips++; flips++; flipsVal.textContent=flips;
  const pts = dir<0 ? 100 : 150; /* frontflip plus risqué = plus de points */
  flipPoints += pts;
  boost = Math.min(100, boost+45);
  addPopup((dir<0?'BACKFLIP ! +':'FRONTFLIP ! +')+pts, C.popup);
}

/* ---- un pas de physique (dt fixe = 16 ms) ---- */
function physicsStep(){
  const boosting = boostOn() && boost>0;
  if (boosting) boost = Math.max(0, boost-0.8);

  /* 1. intégration Verlet : chaque roue = point masse + gravité */
  for (const w of [rw, fw]){
    const vx=w.x-w.px, vy=w.y-w.py;
    w.px=w.x; w.py=w.y;
    w.x += vx;
    w.y += vy + GRAV;
  }

  /* 2. contact sol : on remonte la roue sur la surface, on amortit le rebond */
  let gcount=0;
  for (const w of [rw, fw]){
    const gy=groundY(w.x);
    if (w.y+WR > gy){
      w.y = gy-WR;
      const vy=w.y-w.py;
      if (vy>0) w.py = w.y + vy*0.5;
      gcount++;
    }
  }
  const gnd = gcount>0;

  /* 3. moteur : quand une roue touche, on pousse la moto le long de la pente */
  if (gnd){
    const cx=(rw.x+fw.x)/2;
    const s=slopeAngle(cx);
    const fwd=((rw.x-rw.px)+(fw.x-fw.px))/2;
    const target = boosting ? BOOST : CRUISE;
    if (fwd < target){
      const add=Math.min(DRIVE, target-fwd);
      const ax=Math.cos(s)*add, ay=Math.sin(s)*add;
      rw.x+=ax; rw.y+=ay; fw.x+=ax; fw.y+=ay;
    }
    if (boosting && Math.random()<0.4) puff(1,1);
  }

  /* 4. cadre rigide : on garde les 2 roues à distance WB constante */
  for (let k=0;k<6;k++){
    let dx=fw.x-rw.x, dy=fw.y-rw.y;
    let d=Math.hypot(dx,dy)||1;
    let diff=(d-WB)/d*0.5;
    dx*=diff; dy*=diff;
    rw.x+=dx; rw.y+=dy; fw.x-=dx; fw.y-=dy;
  }

  let ang=Math.atan2(fw.y-rw.y, fw.x-rw.x);
  const mx=(rw.x+fw.x)/2, my=(rw.y+fw.y)/2;

  /* 5. en l'air : inclinaison MANUELLE (← cabrer / → piquer), pas d'auto-stabilisation.
        C'est au joueur de remettre la moto droite avant d'atterrir. */
  if (!gnd){
    airTime += 16;
    if (!flipHintShown && airTime > 340){
      flipHintShown = true;
      addPopup(IS_TOUCH ? '◀ ▶ pour t\'incliner' : '← → pour t\'incliner', C.popup);
    }
    if (boosting){
      const bx=Math.cos(ang)*0.10, by=Math.sin(ang)*0.10;
      rw.x+=bx; rw.y+=by; fw.x+=bx; fw.y+=by;
    }
    if (leanBackOn()){
      rotateWheels(mx, my, -AIR_SPIN, false); /* cabrer → backflip */
    } else if (leanFwdOn()){
      rotateWheels(mx, my, +AIR_SPIN, false); /* piquer → frontflip */
    } else {
      /* aucune commande : on amortit la rotation pour ne pas tournoyer tout seul.
         On NE réoriente PAS vers le sol — l'inclinaison reste ton boulot. */
      const cvx=((rw.x-rw.px)+(fw.x-fw.px))/2, cvy=((rw.y-rw.py)+(fw.y-fw.py))/2;
      for (const w of [rw, fw]){
        const rvx=(w.x-w.px-cvx)*AIR_DAMP, rvy=(w.y-w.py-cvy)*AIR_DAMP;
        w.px=w.x-(cvx+rvx); w.py=w.y-(cvy+rvy);
      }
    }
    const ang2=Math.atan2(fw.y-rw.y, fw.x-rw.x);
    rotSum += normAngle(ang2-lastAng);
    while (rotSum <= -2*Math.PI*0.9){ rotSum += 2*Math.PI; doFlip(-1); }
    while (rotSum >=  2*Math.PI*0.9){ rotSum -= 2*Math.PI; doFlip(+1); }
    lastAng=ang2; ang=ang2;
  } else {
    airTime=0; lastAng=ang;
  }

  /* 6. transitions décollage / atterrissage */
  if (gnd && !wasGnd){
    const diff=normAngle(ang - slopeAngle(mx));
    if (Math.abs(diff) > CRASH_ANG){
      bike.x=mx; bike.y=my; bike.angle=ang; bike.onGround=gnd;
      crash(); return;
    }
    puff(6,1.4);
    if (airFlips>0) addPopup('Réception !', '#9fffc0');
    airFlips=0;
  }
  if (!gnd && wasGnd){ rotSum=0; airFlips=0; lastAng=ang; }
  wasGnd=gnd;

  /* 7. mise à jour de l'objet bike (rendu / caméra / score) */
  const fwd=((rw.x-rw.px)+(fw.x-fw.px))/2;
  bike.wheelRot += fwd/WR;
  bike.x=mx; bike.y=my; bike.angle=ang; bike.onGround=gnd;
}

/* ---- update : accumulateur à pas fixe + logique hors-physique ---- */
function update(dtMs){
  physAcc += dtMs;
  let steps=0;
  while (physAcc >= 16 && steps < 6){
    physicsStep();
    if (!running) return;   // crash déclenché dans le pas
    physAcc -= 16; steps++;
  }
  const b = bike;

  /* bonus de boost */
  ensurePickups();
  for (const p of pickups){
    if (p.taken) continue;
    const dx=b.x-p.x, dy=b.y-p.y;
    if (dx*dx+dy*dy < 30*30){
      p.taken = true;
      boost = Math.min(100, boost+40);
      popups.push({txt:'+ BOOST', col:'#ff9d5c', x:p.x, y:p.y-24, t:1200});
    }
  }

  const dist = Math.min(RACE_M, Math.floor((b.x-100)/10));
  distVal.textContent = dist;

  /* ligne d'arrivée à 1000 m */
  if (!finished && b.x >= FINISH_X){
    finished = true;
    finishGame();
    return;
  }

  elapsed += dtMs;
  if (mode==='jour'){
    recT += dtMs;
    while (recT >= REC_DT && recFrames.length < 8000){
      recFrames.push([Math.round(b.x*10)/10, Math.round(b.y*10)/10, Math.round(b.angle*100)/100]);
      recT -= REC_DT;
    }
  }

  camX = b.x - 240;
  camY += ((b.y - H*0.58) - camY)*Math.min(1, 0.006*dtMs);
  popups.forEach(p=>{ p.t-=dtMs; p.y-=0.02*dtMs; });
  popups = popups.filter(p=>p.t>0);
  dust.forEach(d=>{ d.t-=dtMs; d.x+=d.vx*dtMs; d.y+=d.vy*dtMs; });
  dust = dust.filter(d=>d.t>0);
}

/* ---- dessin moto (joueur / fantôme) ---- */
function drawMoto(x, y, angle, wheelRot, ghost){
  ctx.save();
  ctx.translate(x-camX, y-camY);
  ctx.rotate(angle);
  ctx.translate(0, -11); /* les roues sont dessinées à y=11 ; on aligne sur le centre physique */
  const frame = ghost ? C.ghost : '#ff5a2e';
  const metal = ghost ? C.ghost : '#e8d8c4';
  const tire  = ghost ? C.ghost : '#241826';
  const rider = ghost ? C.ghost : '#241a2e';
  const helmet= ghost ? C.ghost : '#FBF7F0';
  if (ghost) ctx.globalAlpha = 0.4;

  for (const wx of [-17, 17]){
    ctx.strokeStyle=tire; ctx.lineWidth=5;
    ctx.beginPath(); ctx.arc(wx,11,9,0,7); ctx.stroke();
    ctx.strokeStyle=metal; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(wx,11,5.5,0,7); ctx.stroke();
    ctx.save();
    ctx.translate(wx,11); ctx.rotate(wheelRot);
    ctx.beginPath();
    ctx.moveTo(-5.5,0); ctx.lineTo(5.5,0);
    ctx.moveTo(0,-5.5); ctx.lineTo(0,5.5);
    ctx.stroke();
    ctx.restore();
  }
  ctx.strokeStyle=metal; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(-17,11); ctx.lineTo(-5,4);
  ctx.moveTo(17,11); ctx.lineTo(11,-3);
  ctx.stroke();
  ctx.strokeStyle=frame; ctx.lineWidth=5;
  ctx.beginPath();
  ctx.moveTo(-6,4); ctx.lineTo(2,3); ctx.lineTo(10,-3);
  ctx.stroke();
  ctx.fillStyle=frame;
  ctx.beginPath(); ctx.ellipse(3,-3,7,3.5,-0.25,0,7); ctx.fill();
  ctx.fillStyle=rider;
  ctx.fillRect(-9,-4,9,3);
  ctx.strokeStyle=metal; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.moveTo(11,-3); ctx.lineTo(14,-9); ctx.lineTo(17,-10); ctx.stroke();
  ctx.strokeStyle=rider; ctx.lineWidth=4; ctx.lineJoin='round';
  ctx.beginPath();
  ctx.moveTo(-3,3); ctx.lineTo(-5,-4);
  ctx.moveTo(-5,-4); ctx.lineTo(-2,-15);
  ctx.moveTo(-2,-15); ctx.lineTo(13,-9);
  ctx.stroke();
  ctx.fillStyle=helmet;
  ctx.beginPath(); ctx.arc(-1,-19,5.5,0,7); ctx.fill();
  ctx.fillStyle= ghost ? 'rgba(28,16,56,0.5)' : '#241a2e';
  ctx.beginPath(); ctx.arc(1,-19.5,2.6,0,7); ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
}

function drawGhost(){
  if (!ghostData || !ghostData.frames || !ghostData.frames.length) return;
  const fr = ghostData.frames;
  const fi = elapsed/REC_DT;
  const i0 = Math.min(fr.length-1, Math.floor(fi));
  const i1 = Math.min(fr.length-1, i0+1);
  const t = fi-i0;
  const gx = fr[i0][0]+(fr[i1][0]-fr[i0][0])*t;
  const gy = fr[i0][1]+(fr[i1][1]-fr[i0][1])*t;
  const ga = fr[i0][2] + normAngle(fr[i1][2]-fr[i0][2])*t;
  const sx = gx-camX;
  if (sx < -60 || sx > W+60) return;
  drawMoto(gx, gy, ga, gx/10, true);
}

function keycap(cx, cy, label, desc){
  ctx.font='bold 13px monospace';
  const w = Math.max(34, ctx.measureText(label).width+18);
  ctx.fillStyle='rgba(28,16,56,0.75)';
  ctx.strokeStyle='rgba(251,247,240,0.7)';
  ctx.lineWidth=1.5;
  ctx.beginPath();
  ctx.roundRect(cx, cy-14, w, 26, 6);
  ctx.fill(); ctx.stroke();
  ctx.fillStyle='#FBF7F0'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(label, cx+w/2, cy);
  ctx.fillStyle='rgba(251,247,240,0.75)'; ctx.textAlign='left';
  ctx.font='12px monospace';
  ctx.fillText(desc, cx+w+8, cy);
  ctx.textBaseline='alphabetic';
  return cx+w+8+ctx.measureText(desc).width;
}

/* ---- draw ---- */
let skyGrad=null;
function draw(){
  if (!skyGrad){
    skyGrad = ctx.createLinearGradient(0,0,0,H);
    skyGrad.addColorStop(0,C.skyTop);
    skyGrad.addColorStop(0.42,C.skyMid);
    skyGrad.addColorStop(0.75,C.skyLow);
    skyGrad.addColorStop(1,C.skyHor);
  }
  ctx.fillStyle=skyGrad; ctx.fillRect(0,0,W,H);

  /* étoiles dans la partie haute */
  ctx.fillStyle='rgba(255,235,215,0.5)';
  for(let i=0;i<26;i++){
    const sx=((i*263 - camX*0.05)%W+W)%W;
    const sy=(i*71)%Math.floor(H*0.32);
    ctx.fillRect(sx,sy,2,2);
  }

  /* soleil couchant avec halo */
  const sunX = W*0.72, sunY = H*0.56;
  const halo = ctx.createRadialGradient(sunX,sunY,10,sunX,sunY,150);
  halo.addColorStop(0,C.sunGlow);
  halo.addColorStop(1,'rgba(255,170,90,0)');
  ctx.fillStyle=halo; ctx.fillRect(sunX-150,sunY-150,300,300);
  ctx.fillStyle=C.sun;
  ctx.beginPath(); ctx.arc(sunX,sunY,34,0,7); ctx.fill();

  /* nuages fins */
  ctx.fillStyle='rgba(255,170,120,0.14)';
  for(let i=0;i<4;i++){
    const cx2=((i*331 - camX*0.1)%(W+240)+(W+240))%(W+240)-120;
    const cy2=40+i*46;
    ctx.beginPath(); ctx.ellipse(cx2,cy2,85,10,0,0,7); ctx.fill();
    ctx.beginPath(); ctx.ellipse(cx2+50,cy2+7,55,8,0,0,7); ctx.fill();
  }

  /* collines lointaines */
  ctx.fillStyle=C.hillFar;
  ctx.beginPath(); ctx.moveTo(0,H);
  for(let sx=0;sx<=W;sx+=16){
    const wx=(sx+camX*0.18);
    ctx.lineTo(sx, H*0.54+42*Math.sin(wx*0.003)+18*Math.sin(wx*0.009+2) - camY*0.12);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();
  ctx.fillStyle=C.hillMid;
  ctx.beginPath(); ctx.moveTo(0,H);
  for(let sx=0;sx<=W;sx+=16){
    const wx=(sx+camX*0.42);
    ctx.lineTo(sx, H*0.62+32*Math.sin(wx*0.005+1)+13*Math.sin(wx*0.013) - camY*0.25);
  }
  ctx.lineTo(W,H); ctx.closePath(); ctx.fill();

  /* terrain */
  const gGrad = ctx.createLinearGradient(0,H*0.3,0,H);
  gGrad.addColorStop(0,C.ground);
  gGrad.addColorStop(1,C.groundDeep);
  ctx.beginPath(); ctx.moveTo(0,H+50);
  for(let sx=0;sx<=W;sx+=5) ctx.lineTo(sx, groundY(sx+camX)-camY);
  ctx.lineTo(W,H+50); ctx.closePath();
  ctx.fillStyle=gGrad; ctx.fill();

  /* arbres morts en silhouette */
  ctx.strokeStyle=C.tree; ctx.lineWidth=4; ctx.lineCap='round';
  const k0 = Math.floor((camX-100)/620);
  for(let k=k0;k<k0+3;k++){
    if (k<1) continue;
    const tr = mulberry32(curSeed+k*7919)();
    const tx = k*620 + tr*300;
    const sx = tx-camX;
    if (sx<-40||sx>W+40) continue;
    const ty = groundY(tx)-camY;
    const hgt = 26+tr*22;
    ctx.beginPath();
    ctx.moveTo(sx,ty); ctx.lineTo(sx,ty-hgt);
    ctx.moveTo(sx,ty-hgt*0.55); ctx.lineTo(sx-10-tr*8,ty-hgt*0.8);
    ctx.moveTo(sx,ty-hgt*0.7); ctx.lineTo(sx+9+tr*7,ty-hgt*0.95);
    ctx.stroke();
  }

  /* liseré lumineux du sol (rim light du couchant) */
  ctx.save();
  ctx.shadowColor=C.rimGlow; ctx.shadowBlur=10;
  ctx.beginPath();
  for(let sx=0;sx<=W;sx+=5){
    const gy=groundY(sx+camX)-camY;
    if(sx===0)ctx.moveTo(sx,gy);else ctx.lineTo(sx,gy);
  }
  ctx.strokeStyle=C.rim; ctx.lineWidth=3.5; ctx.stroke();
  ctx.restore();

  /* bornes tous les 500 px */
  ctx.fillStyle='rgba(255,220,190,0.45)';
  ctx.font='12px monospace'; ctx.textAlign='center';
  const first = Math.ceil(camX/500)*500;
  for(let mx=first; mx<camX+W; mx+=500){
    if (mx<=100 || mx>=FINISH_X) continue;
    const sx=mx-camX;
    const gy=groundY(mx)-camY;
    ctx.fillRect(sx-1.5,gy-20,3,20);
    ctx.fillText(Math.floor((mx-100)/10)+'m', sx, gy-26);
  }

  /* ligne d'arrivée (damier) */
  if (FINISH_X > camX-40 && FINISH_X < camX+W+40){
    const sx=FINISH_X-camX, gy=groundY(FINISH_X)-camY, ph=80;
    ctx.fillStyle='rgba(28,16,56,0.9)'; ctx.fillRect(sx-2,gy-ph,4,ph);           // poteau
    ctx.fillRect(sx-2,gy-ph-6,44,6);                                             // hampe
    for(let r=0;r<4;r++)for(let c=0;c<5;c++){                                    // drapeau à damier
      ctx.fillStyle=((r+c)&1)?'#f8f4ec':'#241826';
      ctx.fillRect(sx+2+c*8, gy-ph-6+r*8, 8, 8);
    }
    ctx.fillStyle='#9fffc0'; ctx.font='bold 13px monospace'; ctx.textAlign='center';
    ctx.fillText('ARRIVÉE', sx+20, gy-ph-16);
  }

  /* bonus de boost : orbes flamme pulsantes */
  const pulse = 1+0.15*Math.sin(Date.now()/160);
  for (const p of pickups){
    if (p.taken) continue;
    const sx=p.x-camX, sy=p.y-camY;
    if (sx<-30||sx>W+30) continue;
    const glow = ctx.createRadialGradient(sx,sy,2,sx,sy,22*pulse);
    glow.addColorStop(0,'rgba(255,180,90,0.8)');
    glow.addColorStop(1,'rgba(255,120,50,0)');
    ctx.fillStyle=glow;
    ctx.beginPath(); ctx.arc(sx,sy,22*pulse,0,7); ctx.fill();
    ctx.fillStyle='#ffd866';
    ctx.beginPath(); ctx.arc(sx,sy,9,0,7); ctx.fill();
    ctx.fillStyle='#b3401e';
    ctx.font='bold 12px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('⚡', sx, sy+1);
    ctx.textBaseline='alphabetic';
  }

  /* poussière */
  dust.forEach(d=>{
    ctx.globalAlpha = Math.min(0.5, d.t/800);
    ctx.fillStyle=C.dust;
    ctx.beginPath(); ctx.arc(d.x-camX, d.y-camY, d.r, 0, 7); ctx.fill();
  });
  ctx.globalAlpha=1;

  if (mode==='jour' && running) drawGhost();

  /* traînées de vitesse pendant le boost */
  if (running && boostOn() && boost>0){
    ctx.strokeStyle='rgba(255,200,120,0.4)'; ctx.lineWidth=2;
    for(let i=0;i<5;i++){
      const ly = bike.y-camY - 14 + i*8;
      const lx = bike.x - camX - 30 - Math.random()*30;
      ctx.beginPath(); ctx.moveTo(lx,ly); ctx.lineTo(lx-24,ly); ctx.stroke();
    }
  }

  drawMoto(bike.x, bike.y, bike.angle, bike.wheelRot, false);

  /* flamme boost */
  if (running && boostOn() && boost>0){
    ctx.save();
    ctx.translate(bike.x-camX, bike.y-camY);
    ctx.rotate(bike.angle);
    ctx.translate(0, -11);
    ctx.fillStyle='#ffd866';
    ctx.beginPath();
    ctx.moveTo(-26,8); ctx.lineTo(-40-Math.random()*10,11); ctx.lineTo(-26,14);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle='#ff5a2e';
    ctx.beginPath();
    ctx.moveTo(-26,9.5); ctx.lineTo(-34-Math.random()*6,11); ctx.lineTo(-26,12.5);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  }

  /* popups */
  popups.forEach(p=>{
    ctx.globalAlpha=Math.min(1,p.t/500);
    ctx.font='bold 22px monospace'; ctx.textAlign='center';
    ctx.lineWidth=4; ctx.strokeStyle='rgba(28,16,56,0.85)';
    ctx.strokeText(p.txt, p.x-camX, p.y-camY);
    ctx.fillStyle=p.col;
    ctx.fillText(p.txt, p.x-camX, p.y-camY);
    ctx.globalAlpha=1;
  });

  /* jauge boost */
  ctx.fillStyle='rgba(28,16,56,0.6)'; ctx.fillRect(18,18,168,20);
  ctx.fillStyle= boost>15 ? '#ffb763' : '#ff5a2e';
  ctx.fillRect(21,21,162*boost/100,14);
  ctx.strokeStyle='rgba(255,220,190,0.7)'; ctx.lineWidth=1.5; ctx.strokeRect(18,18,168,20);
  ctx.fillStyle='rgba(255,235,215,0.9)'; ctx.font='bold 11px monospace'; ctx.textAlign='left';
  ctx.fillText('BOOST', 24, 51);
  ctx.fillStyle='rgba(255,235,215,0.55)';
  ctx.fillText('backflip ou ⚡ = recharge', 74, 51);

  /* rappel des touches pendant le jeu (desktop) */
  if (running && !IS_TOUCH){
    let nx = keycap(18, H-26, '←', 'cabrer');
    nx = keycap(nx+14, H-26, '→', 'piquer');
    keycap(nx+14, H-26, 'ESPACE', 'boost');
  }

  /* crash flash */
  if (crashT>0){
    ctx.fillStyle=`rgba(212,48,48,${0.35*crashT})`;
    ctx.fillRect(0,0,W,H);
  }

  /* écran titre */
  if (!running && !controls.classList.contains('hidden') && overMsg.style.display==='none'){
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.font='bold 46px monospace';
    ctx.lineWidth=6; ctx.strokeStyle='rgba(28,16,56,0.9)';
    ctx.strokeText('MOTO BACKFLIP', W/2, H/2-78);
    ctx.fillStyle='#ffd866';
    ctx.fillText('MOTO BACKFLIP', W/2, H/2-78);
    ctx.fillStyle='#ffe8d0'; ctx.font='17px monospace';
    ctx.fillText('Rejoins l\'arrivée à 1000 m. Retombe sur tes roues !', W/2, H/2-34);
    if (IS_TOUCH){
      ctx.fillText('◀ cabrer (backflip)  ·  piquer (frontflip) ▶', W/2, H/2-4);
      ctx.fillText('🔥 boost  ·  incline-toi pour bien atterrir', W/2, H/2+26);
    } else {
      ctx.fillText('← cabrer / backflip  ·  → piquer / frontflip', W/2, H/2-4);
      ctx.fillText('ESPACE = boost  ·  incline-toi pour bien atterrir', W/2, H/2+26);
    }
    ctx.textBaseline='alphabetic';
  }
}

let finalScore=0;
function showEnd(headerHtml){
  let ghostMsg = '';
  if (mode==='jour'){
    const prev = loadGhost();
    if (!prev || finalScore > prev.score){
      try{ localStorage.setItem(ghostKey(), JSON.stringify({score:finalScore, frames:recFrames})); }catch{}
      ghostMsg = prev ? '<br>Fantôme battu ! ('+prev.score+' → '+finalScore+')' : '<br>Fantôme enregistré !';
    } else {
      ghostMsg = '<br>Fantôme : '+prev.score+' pts — pas battu';
    }
  }
  overMsg.innerHTML = headerHtml + ghostMsg;
  overMsg.style.display='block';
  btnStart.textContent='Rejouer (libre) →';
  controls.classList.remove('hidden');
  const entries=loadCache(); renderLeaderboard(entries);
  if(qualifies(finalScore,entries)){
    nameEntry.classList.add('on');
    playerNameInput.value=localStorage.getItem('lb-name')||'';
    playerNameInput.focus();
  }
  fetchLB().then(e=>renderLeaderboard(e));
}
/* CRASH avant l'arrivée : score partiel (distance + flips), toujours < une arrivée */
function endGame(){
  running=false;
  finalScore = Math.floor((bike.x-100)/10) + flipPoints;
  showEnd('<b>CRASH !</b><br>Distance : '+Math.floor((bike.x-100)/10)+' / 1000 m · Flips : '+flips+'<br>Score : '+finalScore);
}
/* ARRIVÉE à 1000 m : bonus de complétion + bonus de vitesse + flips */
function finishGame(){
  running=false; crashT=0;
  const timeSec = elapsed/1000;
  const speedBonus = Math.max(0, Math.round((150 - timeSec) * 40));
  finalScore = 1000 + flipPoints + speedBonus;
  showEnd('<b style="color:#9fffc0">ARRIVÉE !</b><br>Temps : '+timeSec.toFixed(1)+' s · Flips : '+flips+
          '<br>Bonus vitesse : +'+speedBonus+'<br>Score : '+finalScore);
}
function doSubmit(){
  const name=playerNameInput.value.trim()||'Anonyme';
  localStorage.setItem('lb-name',name);
  renderLeaderboard(addToLB(name,finalScore),name);
  nameEntry.classList.remove('on');
}
btnSubmit.addEventListener('click',doSubmit);
playerNameInput.addEventListener('keydown',e=>{if(e.key==='Enter')doSubmit();});
btnSkip.addEventListener('click',()=>{nameEntry.classList.remove('on');});

/* ---- boucle ---- */
let lastT=0;
function loop(t){
  const dt=Math.min(34,t-lastT); lastT=t;
  if (running) update(dt);
  if (crashT>0) crashT=Math.max(0,crashT-dt/900);
  draw();
  requestAnimationFrame(loop);
}

resetGame();
requestAnimationFrame(loop);
renderLeaderboard(loadCache());
fetchLB().then(renderLeaderboard);
</script>
