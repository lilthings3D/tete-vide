<style>
  :root{
    --cream:#FBF7F0;--cream-deep:#f0e4cf;--paper:#fbf6ec;
    --ink:#2e2218;--ink-soft:#5b4a39;
    --orange:#D43030;--orange-deep:#B02020;
    --rule:#e0cfb0;--rule-strong:#c9b189;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;}
  body{
    background:var(--cream);color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    display:flex;flex-direction:column;

  header.site{flex-shrink:0;padding:0 28px;border-bottom:1.5px solid var(--ink);z-index:10;}
  .topbar{display:flex;justify-content:space-between;align-items:center;height:52px;}
  .brand{font-family:'Newsreader',Georgia,serif;font-weight:600;font-size:1.05rem;text-decoration:none;color:var(--ink);}
  .brand b{color:var(--orange-deep);}
  .sitenav{display:flex;gap:0;}
  .sitenav-link{font-family:'Newsreader',Georgia,serif;font-size:0.85rem;font-weight:500;color:var(--ink-soft);text-decoration:none;padding:0 10px 2px;border-bottom:2px solid transparent;transition:color .2s,border-color .2s;}

  #arena{flex:1;min-height:0;display:flex;flex-direction:column;align-items:center;padding:20px 32px;overflow-y:auto;position:relative;z-index:2;}

  @media(max-width:900px){#arena{padding:16px 20px;}canvas{max-height:50vh !important;}}

  #canvas-wrap{position:relative;display:inline-block;max-width:100%;}
  canvas{display:block;border:2px solid var(--ink);background:#1a1208;max-width:100%;}

  #game-title{
    font-family:'Newsreader',Georgia,serif;font-weight:300;font-style:italic;

    padding:8px 0 6px;text-align:center;
  }
  #game-title b{font-style:normal;font-weight:600;color:var(--orange-deep);}

  #info-bar{font-size:0.78rem;letter-spacing:1px;text-transform:uppercase;color:var(--ink-soft);text-align:center;padding:0 0 6px;line-height:1.8;}
  #info-bar strong{color:var(--orange-deep);}

  #controls{
    position:absolute;inset:0;z-index:5;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;
    background:rgba(26,18,8,0.65);

  #controls.hidden{display:none;}

  .btn{
    font-family:'Newsreader',Georgia,serif;font-size:0.9rem;letter-spacing:.3px;text-transform:uppercase;

  #over-msg{

  /* NAME ENTRY */
  #name-entry{display:none;flex-direction:column;align-items:center;gap:10px;margin-top:4px;}
  #name-entry.on{display:flex;}
  .name-label{font-family:'Newsreader',Georgia,serif;font-size:0.85rem;letter-spacing:1px;color:rgba(245,237,220,.85);text-transform:uppercase;text-align:center;}
  #player-name{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;font-size:1rem;
    padding:8px 14px;border:1.5px solid rgba(245,237,220,.5);
    background:rgba(26,18,8,.6);color:#f5eddc;outline:none;text-align:center;
    width:200px;
  }
  #player-name::placeholder{color:rgba(245,237,220,.35);}
  #player-name:focus{border-color:#f5eddc;}
  .btn-skip{font-family:'Newsreader',Georgia,serif;font-size:0.72rem;letter-spacing:1px;color:rgba(245,237,220,.4);text-transform:uppercase;background:none;border:none;cursor:pointer;margin-top:-4px;}

  .dpad{display:none;grid-template-areas:". up ." "left . right" ". down .";gap:10px;margin:14px 0 4px;}
  .dpad-btn{
    width:72px;height:72px;border:2px solid var(--ink);background:rgba(251,247,240,0.85);
    font-size:1.7rem;color:var(--ink);border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;user-select:none;-webkit-user-select:none;touch-action:none;
  }
  #d-up{grid-area:up;} #d-left{grid-area:left;} #d-down{grid-area:down;} #d-right{grid-area:right;}
  @media(pointer:coarse){.dpad{display:grid;}}

  /* LEADERBOARD */
  #lb-section{position:absolute;top:20px;right:32px;width:260px;padding-top:46px;max-height:calc(100vh - 130px);overflow-y:auto;}
  #lb-section h2{font-family:'Newsreader',Georgia,serif;font-weight:300;font-style:italic;font-size:1.6rem;letter-spacing:-0.5px;border-bottom:1px solid var(--ink);padding-bottom:10px;margin-bottom:20px;}
  #lb-section h2 b{font-style:normal;font-weight:600;color:var(--orange-deep);}
  .lb-table{width:100%;border-collapse:collapse;}
  .lb-table tr{border-bottom:1px solid var(--rule);}
  .lb-table th{font-family:'Newsreader',Georgia,serif;font-size:0.68rem;letter-spacing:.3px;text-transform:uppercase;color:var(--ink-soft);text-align:left;padding:0 0 10px;font-weight:600;}
  .lb-table td{padding:12px 0;font-size:0.95rem;vertical-align:middle;}
  .lb-table td:first-child{font-family:'Newsreader',Georgia,serif;font-size:0.75rem;letter-spacing:.3px;color:var(--ink-soft);width:36px;}
  .lb-table td:last-child{text-align:right;font-family:'Newsreader',Georgia,serif;font-size:1.1rem;font-weight:600;color:var(--orange-deep);}
  .lb-table tr.lb-me td{color:var(--orange-deep);}
  .lb-empty{font-style:italic;color:var(--ink-soft);padding:20px 0;text-align:center;}

  @media(max-width:900px),(pointer:coarse){
    #lb-section{position:relative;top:auto;right:auto;width:100%;max-width:100%;max-height:none;overflow-y:visible;padding-top:20px;border-top:1.5px solid var(--rule);margin-top:8px;}
  }
  @media(pointer:coarse){
    html,body{height:auto;overflow:visible;}
    #arena{overflow-y:visible;height:auto;flex:none;}
  }
  @media(max-width:600px){
    .topbar{flex-wrap:wrap;padding-bottom:6px;height:auto;}
    .sitenav{width:100%;border-top:1px solid var(--rule);padding-top:8px;margin-top:6px;justify-content:center;flex-wrap:wrap;gap:4px;}
    .sitenav-link{font-size:0.65rem;padding:4px 8px;border:1px solid var(--rule);border-bottom:1px solid var(--rule);}
    .sitenav-link.current{background:var(--ink);color:var(--cream);border-color:var(--ink);}
  }

<div id="arena">
  <div id="game-col">
    <div id="game-title">Snake <b>·</b></div>
    <div id="info-bar">Score : <strong id="score-val">0</strong> &nbsp;·&nbsp; Meilleur local : <strong id="best-val">0</strong></div>
    <div id="canvas-wrap">
      <canvas id="c"></canvas>
      <div id="controls">
        <div id="over-msg" style="display:none"></div>

          <div class="name-label">Nouveau record ! Ton pseudo :</div>

<script>

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const controls = document.getElementById('controls');
const overMsg = document.getElementById('over-msg');
const btnStart = document.getElementById('btn-start');
const nameEntry = document.getElementById('name-entry');
const playerNameInput = document.getElementById('player-name');
const btnSubmit = document.getElementById('btn-submit-score');
const btnSkip = document.getElementById('btn-skip');
const scoreVal = document.getElementById('score-val');
const bestVal = document.getElementById('best-val');
const lbBody = document.getElementById('lb-body');

const GRID = 22, CELL = 24;
const W = GRID*CELL, H = GRID*CELL;
canvas.width = W; canvas.height = H;

const COLORS = { bg:'#1a1208', fg:'#f5eddc', accent:'#D43030', head:'#f0a868' };

let snake, dir, nextDir, food, score, best, running, stepMs, acc, lastT;


best = parseInt(localStorage.getItem('snake-best') || '0', 10);
bestVal.textContent = best;

function resize(){
  const col = document.getElementById('game-col');
  const maxW = col.clientWidth - 4;
  const scale = Math.min(maxW/W, 1);
  canvas.style.width = (W*scale)+'px';
  canvas.style.height = (H*scale)+'px';
}
window.addEventListener('resize', resize);
resize();

/* ---- LEADERBOARD (Google Apps Script global) ---- */
const LB_URL   = 'https://script.google.com/macros/s/AKfycbwyBOl_zvYu9U7LciBuBeQhta19z1lWJ7hXr7KYFmfaWCc_ZnV_QIUoU-wri5Pu4Ps/exec';
const LB_GAME  = 'snake';
const LB_CACHE = 'lb-snake-cache';

function loadCache(){ try{ return JSON.parse(localStorage.getItem(LB_CACHE))||[]; }catch{ return []; } }
function saveCache(e){ localStorage.setItem(LB_CACHE, JSON.stringify(e)); }
function qualifies(sc, entries){ return sc > 0 && (entries.length < 10 || sc > entries[entries.length-1].score); }

async function fetchLB(){
  try{
    const r = await fetch(LB_URL + '?game=' + LB_GAME);
    const entries = await r.json();
    if(Array.isArray(entries)){ saveCache(entries); return entries; }
    return loadCache();
  }catch{ return loadCache(); }
}

function addToLB(name, sc){
  const url = LB_URL + '?action=add&game=' + LB_GAME + '&name=' + encodeURIComponent(name) + '&score=' + sc;
  fetch(url).then(r=>r.json()).then(e=>{ if(Array.isArray(e)){ saveCache(e); renderLeaderboard(e, name); } }).catch(()=>{});
  const entries = [...loadCache(),{name,score:sc}].sort((a,b)=>b.score-a.score).slice(0,10);
  saveCache(entries); return entries;
}
function renderLeaderboard(entries, hl){
  const m = ['🥇','🥈','🥉'];
  lbBody.innerHTML = entries.length
    ? entries.map((e,i) => `<tr class="${i===0?'lb-rank-1':''} ${hl&&e.name===hl?'lb-me':''}">
        <td>${m[i]||'#'+(i+1)}</td><td>${e.name}</td><td>${e.score}</td></tr>`).join('')
    : '<tr><td colspan="3" class="lb-empty">Pas encore de scores — sois le premier !</td></tr>';
}

/* ---- GAME ---- */
function placeFood(){
  let p;
  do { p = { x:Math.floor(Math.random()*GRID), y:Math.floor(Math.random()*GRID) }; }
  while (snake.some(s=>s.x===p.x && s.y===p.y));
  food = p;
}

function resetGame(){
  snake = [{x:11,y:11},{x:10,y:11},{x:9,y:11}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; stepMs = 220;
  scoreVal.textContent = '0';
  placeFood();
}

function startGame(){
  resetGame();
  overMsg.style.display = 'none';
  nameEntry.classList.remove('on');
  controls.classList.add('hidden');
  running = true; acc = 0; lastT = performance.now();
  requestAnimationFrame(loop);
}
btnStart.addEventListener('click', startGame);

function setDir(nx,ny){
  if(dir.x===-nx && dir.y===-ny) return;
  nextDir = {x:nx,y:ny};
}

document.addEventListener('keydown', e => {
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') setDir(0,-1);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') setDir(0,1);
  else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') setDir(-1,0);
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') setDir(1,0);
  else if(e.key==='Enter' && !nameEntry.classList.contains('on') && controls.classList.contains('hidden')) startGame();
});

function bindDpad(id,nx,ny){
  const el = document.getElementById(id);
  const fire = e => { e.preventDefault(); setDir(nx,ny); };
  el.addEventListener('touchstart', fire, {passive:false});
  el.addEventListener('click', fire);
}
bindDpad('d-up',0,-1); bindDpad('d-down',0,1); bindDpad('d-left',-1,0); bindDpad('d-right',1,0);

function step(){
  dir = nextDir;
  const head = { x:snake[0].x+dir.x, y:snake[0].y+dir.y };
  if(head.x<0||head.x>=GRID||head.y<0||head.y>=GRID||snake.some(s=>s.x===head.x&&s.y===head.y)){
    gameOver(); return;
  }
  snake.unshift(head);
  if(head.x===food.x && head.y===food.y){
    score++; scoreVal.textContent = score;
    stepMs = Math.max(130, 220-score*4);
    placeFood();
  } else { snake.pop(); }
}

function gameOver(){
  running = false;
  if(score>best){ best=score; localStorage.setItem('snake-best',best); bestVal.textContent=best; }
  overMsg.textContent = 'Score : ' + score;
  overMsg.style.display = 'block';
  btnStart.textContent = 'Rejouer →';
  controls.classList.remove('hidden');
  const entries = loadCache();
  renderLeaderboard(entries);
  if(qualifies(score, entries)){
    nameEntry.classList.add('on');
    playerNameInput.value = localStorage.getItem('lb-name')||'';
    playerNameInput.focus();
  }
  fetchLB().then(e => renderLeaderboard(e));
}

function doSubmit(){
  const name = playerNameInput.value.trim()||'Anonyme';
  localStorage.setItem('lb-name', name);
  const entries = addToLB(name, score);
  renderLeaderboard(entries, name);
  nameEntry.classList.remove('on');
}

btnSubmit.addEventListener('click', doSubmit);
playerNameInput.addEventListener('keydown', e => { if(e.key==='Enter') doSubmit(); });
btnSkip.addEventListener('click', () => { nameEntry.classList.remove('on'); controls.classList.remove('hidden'); });

function draw(){
  ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);
  ctx.fillStyle = COLORS.accent;
  ctx.beginPath(); ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL*0.35, 0, Math.PI*2); ctx.fill();
  snake.forEach((s,i) => {
    ctx.fillStyle = i===0 ? COLORS.head : COLORS.fg;
    ctx.fillRect(s.x*CELL+1, s.y*CELL+1, CELL-2, CELL-2);
  });
}

function loop(t){
  if(!running) return;
  const dt = t-lastT; lastT = t; acc += dt;
  if(acc>=stepMs){ acc=0; step(); }
  draw(); requestAnimationFrame(loop);
}

resetGame();
ctx.fillStyle = COLORS.bg; ctx.fillRect(0,0,W,H);
renderLeaderboard(loadCache());
fetchLB().then(renderLeaderboard);
</script>
<script>
/* Bloque le zoom à deux doigts (pinch) sur mobile, sans empêcher le défilement à un doigt.
   (le double-tap est bloqué par user-scalable=no dans le viewport) */
['gesturestart','gesturechange','gestureend'].forEach(function(ev){
  document.addEventListener(ev, function(e){ e.preventDefault(); }, {passive:false});
});
document.addEventListener('touchmove', function(e){
  if(e.touches.length>1) e.preventDefault();
}, {passive:false});
</script>
