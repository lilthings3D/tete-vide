  text-transform:uppercase;color:var(--ink);
  user-select:none;transition:background .12s;
}
.cw-cell.black{background:var(--ink);cursor:default;pointer-events:none;}
.cw-cell.word-hi{background:#fde8d8;}
.cw-cell.cell-hi{background:#f9c4a4;}
.cw-cell.correct{background:#d4edda;color:var(--green);}
.cw-cell.wrong{background:#f8d7da;color:#721c24;}
.cw-cell.revealed{background:#e8e0f0;color:#4a2d7a;}
.cell-num{

  color:var(--ink-soft);font-family:'Fraunces',serif;

// ===================== GENERATOR =====================
function normalize(word){
  return word.toUpperCase()
    .normalize('NFD').replace(/[̀-ͯ]/g,'')
    .replace(/[^A-Z]/g,'');
}
const key = (r,c) => `${r},${c}`;

function canPlace(grid, word, row, col, dir){
  const preR = dir==='H'?row:row-1, preC = dir==='H'?col-1:col;
  if(grid.has(key(preR,preC))) return false;
  const postR = dir==='H'?row:row+word.length, postC = dir==='H'?col+word.length:col;
  if(grid.has(key(postR,postC))) return false;
  let hasIntersection = false;
  for(let i=0;i<word.length;i++){
    const r = dir==='H'?row:row+i, c = dir==='H'?col+i:col;
    if(grid.has(key(r,c))){
      if(grid.get(key(r,c))!==word[i]) return false;
      hasIntersection = true;
    } else {
      const p1r=dir==='H'?r-1:r, p1c=dir==='H'?c:c-1;
      const p2r=dir==='H'?r+1:r, p2c=dir==='H'?c:c+1;
      if(grid.has(key(p1r,p1c))||grid.has(key(p2r,p2c))) return false;
    }
  }
  return hasIntersection;
}

function countIntersections(grid, word, row, col, dir){
  let count=0;
  for(let i=0;i<word.length;i++){
    const r=dir==='H'?row:row+i, c=dir==='H'?col+i:col;
    if(grid.get(key(r,c))===word[i]) count++;
  }
  return count;
}

function placeOnGrid(grid, word, row, col, dir){
  for(let i=0;i<word.length;i++){
    const r=dir==='H'?row:row+i, c=dir==='H'?col+i:col;
    grid.set(key(r,c),word[i]);
  }
}

function findCandidates(grid, placed, newWord){
  const candidates=[];
  for(const pw of placed){
    const oppDir = pw.direction==='H'?'V':'H';
    for(let ei=0;ei<pw.word.length;ei++){
      for(let ni=0;ni<newWord.length;ni++){
        if(pw.word[ei]!==newWord[ni]) continue;
        let row,col;
        if(pw.direction==='H'){ col=pw.col+ei; row=pw.row-ni; }
        else { row=pw.row+ei; col=pw.col-ni; }
        if(canPlace(grid,newWord,row,col,oppDir)){
          const score=countIntersections(grid,newWord,row,col,oppDir);
          candidates.push({row,col,dir:oppDir,score});
        }
      }
    }
  }
  return candidates;
}

function generateCrossword(wordEntries, targetWords=15){
  if(!wordEntries.length) return null;
  const entries = wordEntries
    .map(e=>({...e,upper:normalize(e.word)}))
    .filter(e=>e.upper.length>=3)
    .sort((a,b)=>b.upper.length-a.upper.length);

  const grid = new Map();
  const placed = [];

  const first = entries[0];
  placeOnGrid(grid, first.upper, 0, 0, 'H');
  placed.push({id:first.id,word:first.upper,originalWord:first.word,definition:first.definition,row:0,col:0,direction:'H',number:0});
  let hCount=1, vCount=0;

  for(const entry of entries.slice(1)){
    if(placed.length>=targetWords) break;
    const candidates = findCandidates(grid,placed,entry.upper);
    if(!candidates.length) continue;
    let pool2 = candidates;
    if(hCount>vCount){ const v=candidates.filter(c=>c.dir==='V'); if(v.length) pool2=v; }
    else if(vCount>hCount){ const h=candidates.filter(c=>c.dir==='H'); if(h.length) pool2=h; }
    pool2.sort((a,b)=>b.score!==a.score?b.score-a.score:(Math.abs(a.row)+Math.abs(a.col))-(Math.abs(b.row)+Math.abs(b.col)));
    const best=pool2[0];
    placeOnGrid(grid,entry.upper,best.row,best.col,best.dir);
    placed.push({id:entry.id,word:entry.upper,originalWord:entry.word,definition:entry.definition,row:best.row,col:best.col,direction:best.dir,number:0});
    if(best.dir==='H') hCount++; else vCount++;
  }

  if(placed.length<3) return null;

  let minR=Infinity,minC=Infinity,maxR=-Infinity,maxC=-Infinity;
  for(const [k] of grid){ const [r,c]=k.split(',').map(Number); if(r<minR)minR=r;if(c<minC)minC=c;if(r>maxR)maxR=r;if(c>maxC)maxC=c; }

  const ng=new Map();
  for(const [k,v] of grid){ const [r,c]=k.split(',').map(Number); ng.set(key(r-minR,c-minC),v); }
  const np=placed.map(pw=>({...pw,row:pw.row-minR,col:pw.col-minC}));
  const gridH=maxR-minR+1, gridW=maxC-minC+1;

  const cells=Array.from({length:gridH},(_,r)=>Array.from({length:gridW},(_,c)=>({letter:ng.get(key(r,c))??null,wordIds:[]})));
  for(const pw of np) for(let i=0;i<pw.word.length;i++){
    const r=pw.direction==='H'?pw.row:pw.row+i, c=pw.direction==='H'?pw.col+i:pw.col;
    cells[r][c].wordIds.push(pw.id);
  }

  const starts=[]; for(const pw of np) starts.push({r:pw.row,c:pw.col,wordId:pw.id});
  starts.sort((a,b)=>a.r-b.r||a.c-b.c);
  let clueNum=1; const numMap=new Map(); const assigned=new Set();
  for(const {r,c,wordId} of starts){
    const pk=`${r},${c}`;
    if(!assigned.has(pk)){ assigned.add(pk); numMap.set(pk,clueNum); cells[r][c].clueNumber=clueNum; clueNum++; }
    const pw=np.find(p=>p.id===wordId);
    pw.number=numMap.get(pk);
  }

  return {placedWords:np,gridWidth:gridW,gridHeight:gridH,cells};
}

// ===================== GAME STATE =====================
let crossword = null;
let userInput = {};    // key(r,c) -> letter
let activeWordId = null;
let activeCellR = -1, activeCellC = -1;
let activeDir = 'H';
let currentTab = 'h';
let checked = false;
let currentTheme = 'animaux';

// ===================== UI =====================
function getPool(theme){
  if(theme==='melange'){
    const all=Object.values(DB).flat();
    return [...all].sort(()=>Math.random()-0.5);
  }
  const base=[...(DB[theme]||[])];
  return base.sort(()=>Math.random()-0.5);
}

function generate(){
  const pool = getPool(currentTheme);
  crossword = generateCrossword(pool, 15);
  if(!crossword){ generate(); return; }
  userInput={};
  activeWordId=null; activeCellR=-1; activeCellC=-1;
  checked=false;
  renderGrid();
  renderClues();
  document.getElementById('clues-panel').style.display='';
}

function cellEl(r,c){ return document.querySelector(`[data-r="${r}"][data-c="${c}"]`); }

function renderGrid(){
  const g=document.getElementById('cw-grid');
  g.innerHTML='';
  g.style.gridTemplateColumns=`repeat(${crossword.gridWidth},38px)`;
  g.style.gridTemplateRows=`repeat(${crossword.gridHeight},38px)`;
  g.style.gap='2px';

  for(let r=0;r<crossword.gridHeight;r++){
    for(let c=0;c<crossword.gridWidth;c++){
      const cell=crossword.cells[r][c];
      const div=document.createElement('div');
      div.className='cw-cell'+(cell.letter?'':' black');
      div.dataset.r=r; div.dataset.c=c;
      if(cell.letter){
        if(cell.clueNumber){
          const n=document.createElement('span');
          n.className='cell-num'; n.textContent=cell.clueNumber;
          div.appendChild(n);
        }
        const l=document.createElement('div');
        l.className='cell-letter';
        l.textContent=userInput[key(r,c)]||'';
        div.appendChild(l);
        div.addEventListener('click',()=>onCellClick(r,c));
      }
      g.appendChild(div);
    }
  }
}

function renderClues(){
  const list=document.getElementById('clues-list');
  list.innerHTML='';
  const words=crossword.placedWords;
  const filtered = currentTab==='h'
    ? words.filter(w=>w.direction==='H').sort((a,b)=>a.number-b.number)
    : words.filter(w=>w.direction==='V').sort((a,b)=>a.number-b.number);

  for(const pw of filtered){
    const li=document.createElement('li');
    li.className='clue-item'+(pw.id===activeWordId?' active-clue':'');
    li.dataset.wordId=pw.id;
    li.innerHTML=`<span class="clue-num">${pw.number}</span><span class="clue-text">${pw.definition}</span>`;
    li.addEventListener('click',()=>selectWord(pw.id, pw.direction));
    list.appendChild(li);
  }
}

function highlightCells(){
  // Clear all highlights
  document.querySelectorAll('.cw-cell:not(.black)').forEach(el=>{
    el.classList.remove('word-hi','cell-hi');
  });
  if(!activeWordId) return;
  const pw=crossword.placedWords.find(p=>p.id===activeWordId);
  if(!pw) return;
  for(let i=0;i<pw.word.length;i++){
    const r=pw.direction==='H'?pw.row:pw.row+i;
    const c=pw.direction==='H'?pw.col+i:pw.col;
    const el=cellEl(r,c);
    if(el) el.classList.add('word-hi');
  }
  const ac=cellEl(activeCellR,activeCellC);
  if(ac){ ac.classList.remove('word-hi'); ac.classList.add('cell-hi'); }
}

function selectWord(wordId, dir){
  const pw=crossword.placedWords.find(p=>p.id===wordId);
  if(!pw) return;
  activeWordId=wordId;
  activeDir=dir;
  activeCellR=pw.row; activeCellC=pw.col;
  highlightCells();
  highlightActiveClue();

  // Switch tab to match direction
  const needed=dir==='H'?'h':'v';
  if(currentTab!==needed){ showTab(needed); } else { renderClues(); }
}

function onCellClick(r,c){
  const cell=crossword.cells[r][c];
  if(!cell.letter) return;

  // If clicking same cell and it's an intersection → toggle direction
  if(r===activeCellR && c===activeCellC && cell.wordIds.length>1){
    const otherDir=activeDir==='H'?'V':'H';
    const pw=crossword.placedWords.find(p=>cell.wordIds.includes(p.id)&&p.direction===otherDir);
    if(pw){ selectWord(pw.id, otherDir); return; }
  }

  activeCellR=r; activeCellC=c;
  // Find a word that passes through this cell, prefer current direction
  const pwSame=crossword.placedWords.find(p=>cell.wordIds.includes(p.id)&&p.direction===activeDir);
  const pw=pwSame||crossword.placedWords.find(p=>cell.wordIds.includes(p.id));
  if(!pw) return;
  activeWordId=pw.id;
  activeDir=pw.direction;
  highlightCells();

  const needed=pw.direction==='H'?'h':'v';
  if(currentTab!==needed){ showTab(needed); } else { highlightActiveClue(); }

  // Mobile: focus hidden input to open keyboard
  if('ontouchstart' in window){
    const _inp=document.getElementById('mobile-kb');
    if(_inp){_inp.value=' ';_inp.focus();}
  }
}

function highlightActiveClue(){
  document.querySelectorAll('.clue-item').forEach(li=>{
    li.classList.toggle('active-clue', li.dataset.wordId===activeWordId);
  });
  // Scroll active clue into view
  const active=document.querySelector('.clue-item.active-clue');
  if(active) active.scrollIntoView({block:'nearest'});
}

function showTab(tab){
  currentTab=tab;
  document.getElementById('tab-h').classList.toggle('active',tab==='h');
  document.getElementById('tab-v').classList.toggle('active',tab==='v');
  renderClues();
}

function advanceCursor(){
  if(!activeWordId) return;
  const pw=crossword.placedWords.find(p=>p.id===activeWordId);
  if(!pw) return;
  const idx=pw.direction==='H'?activeCellC-pw.col:activeCellR-pw.row;
  const next=idx+1;
  if(next<pw.word.length){
    activeCellR=pw.direction==='H'?pw.row:pw.row+next;
    activeCellC=pw.direction==='H'?pw.col+next:pw.col;
    highlightCells();
  }
}

function retreatCursor(){
  if(!activeWordId) return;
  const pw=crossword.placedWords.find(p=>p.id===activeWordId);
  if(!pw) return;
  const idx=pw.direction==='H'?activeCellC-pw.col:activeCellR-pw.row;
  const prev=idx-1;
  if(prev>=0){
    activeCellR=pw.direction==='H'?pw.row:pw.row+prev;
    activeCellC=pw.direction==='H'?pw.col+prev:pw.col;
    highlightCells();
  }
}

document.addEventListener('keydown',e=>{
  if(!crossword||activeCellR<0) return;
  const k=e.key.toUpperCase();

  if(k>='A'&&k<='Z'&&k.length===1){
    e.preventDefault();
    if(checked) clearCheck();
    userInput[key(activeCellR,activeCellC)]=k;
    const el=cellEl(activeCellR,activeCellC);
    if(el){ const l=el.querySelector('.cell-letter'); if(l) l.textContent=k; }
    advanceCursor();
  } else if(e.key==='Backspace'){
    e.preventDefault();
    if(checked) clearCheck();
    const k2=key(activeCellR,activeCellC);
    if(userInput[k2]){
      delete userInput[k2];
      const el=cellEl(activeCellR,activeCellC);
      if(el){ const l=el.querySelector('.cell-letter'); if(l) l.textContent=''; }
    } else { retreatCursor(); }
  } else if(e.key==='ArrowRight'||e.key==='ArrowLeft'||e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault();
  }
});

function checkAnswers(){
  if(!crossword) return;
  checked=true;
  for(let r=0;r<crossword.gridHeight;r++){
    for(let c=0;c<crossword.gridWidth;c++){
      const cell=crossword.cells[r][c];
      if(!cell.letter) continue;
      const el=cellEl(r,c);
      if(!el) continue;
      el.classList.remove('correct','wrong','revealed');
      const typed=userInput[key(r,c)]||'';
      if(!typed) continue;
      el.classList.add(typed===cell.letter?'correct':'wrong');
    }
  }
}

function clearCheck(){
  checked=false;
  document.querySelectorAll('.cw-cell').forEach(el=>el.classList.remove('correct','wrong','revealed'));
}

function revealAll(){
  if(!crossword) return;
  checked=false;
  for(let r=0;r<crossword.gridHeight;r++){
    for(let c=0;c<crossword.gridWidth;c++){
      const cell=crossword.cells[r][c];
      if(!cell.letter) continue;
      userInput[key(r,c)]=cell.letter;
      const el=cellEl(r,c);
      if(!el) continue;
      el.classList.remove('correct','wrong');
      el.classList.add('revealed');
      const l=el.querySelector('.cell-letter'); if(l) l.textContent=cell.letter;
    }
  }
}

function resetGrid(){
  if(!crossword) return;
  userInput={};
  checked=false;
  document.querySelectorAll('.cw-cell:not(.black)').forEach(el=>{
    el.classList.remove('correct','wrong','revealed');
    const l=el.querySelector('.cell-letter'); if(l) l.textContent='';
  });
}

// Theme selector
document.getElementById('theme-tabs').addEventListener('click',e=>{
  const btn=e.target.closest('.theme-btn');
  if(!btn) return;
  document.querySelectorAll('.theme-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentTheme=btn.dataset.theme;
});

document.getElementById('btn-gen').addEventListener('click',generate);

// Mobile keyboard input handler
(function(){
  const inp=document.getElementById('mobile-kb');
  if(!inp) return;
  inp.value=' ';
  inp.addEventListener('input',()=>{
    if(!crossword||activeCellR<0){inp.value=' ';return;}
    const v=inp.value.trim();
    if(!v){
      // backspace
      if(checked)clearCheck();
      const k2=key(activeCellR,activeCellC);
      if(userInput[k2]){
        delete userInput[k2];
        const el=cellEl(activeCellR,activeCellC);
        if(el){const l=el.querySelector('.cell-letter');if(l)l.textContent='';}
      } else retreatCursor();
    } else {
      const ch=v.slice(-1).toUpperCase();
      if(ch>='A'&&ch<='Z'){
        if(checked)clearCheck();
        userInput[key(activeCellR,activeCellC)]=ch;
        const el=cellEl(activeCellR,activeCellC);
        if(el){const l=el.querySelector('.cell-letter');if(l)l.textContent=ch;}
        advanceCursor();
        // Refocus for next letter
        setTimeout(()=>{inp.value=' ';inp.focus();},50);
        return;
      }
    }
    inp.value=' ';
  });
})();

// Date
const months=["janvier","février","mars","avril","mai","juin","juillet","août","septembre","octobre","novembre","décembre"];
const now=new Date();
const shortMonths=["jan.","fév.","mars","avr.","mai","juin","juil.","août","sept.","oct.","nov.","déc."];
  document.getElementById("today").innerHTML = '<span class="date-long">'+now.getDate()+" "+months[now.getMonth()]+" "+now.getFullYear()+'</span><span class="date-short">'+now.getDate()+" "+shortMonths[now.getMonth()]+'</span>';
  const todayEl = document.getElementById("today");
  todayEl.title = "Ce jour dans l'histoire";
  todayEl.onclick = openAlmanach;
  async function openAlmanach(){
    document.getElementById("almanach-overlay").classList.add("open");
    document.getElementById("alm-title").textContent = now.getDate()+" "+months[now.getMonth()];
    document.getElementById("alm-content").innerHTML = '<div class="alm-loading">Chargement…</div>';
    try {
      const m = now.getMonth()+1, d = now.getDate();
      const base = "https://fr.wikipedia.org/api/rest_v1/feed/onthisday";
      const [r1,r2,r3] = await Promise.all([fetch(base+"/events/"+m+"/"+d),fetch(base+"/births/"+m+"/"+d),fetch(base+"/deaths/"+m+"/"+d)]);
      const [evData,birthData,deathData] = await Promise.all([r1.json(),r2.json(),r3.json()]);
      const pick = arr => arr&&arr.length ? arr[Math.floor(Math.random()*Math.min(arr.length,8))] : null;
      const ev=pick(evData.events), birth=pick(birthData.births), death=pick(deathData.deaths);
      let html='';
      if(ev)    html+=almBlock('Événement',ev);
      if(birth) html+=almBlock('Naissance',birth);
      if(death) html+=almBlock('Décès',death);
      document.getElementById("alm-content").innerHTML = html||'<div class="alm-loading">Aucune donnée.</div>';
    } catch(e) {
      document.getElementById("alm-content").innerHTML = '<div class="alm-loading">Impossible de charger les données.</div>';
    }
  }
  function almBlock(label,item){
    return '<div class="alm-section"><div class="alm-label">'+label+'</div><div class="alm-year">'+item.year+'</div><div class="alm-text">'+item.text+'</div></div>';
  }
  function closeAlmanach(e){
    if(!e||e.target===document.getElementById("almanach-overlay"))
      document.getElementById("almanach-overlay").classList.remove("open");
  }
  document.addEventListener("keydown",function(e){if(e.key==="Escape")document.getElementById("almanach-overlay").classList.remove("open");});
</script>
